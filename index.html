/* =============================================
   🔥 Firebase 설정
   아래 URL을 본인 Firebase Realtime Database URL로 교체하세요
   예: https://내프로젝트-default-rtdb.asia-southeast1.firebasedatabase.app
============================================= */
const FIREBASE_URL = "https://mydreamcareerbuilder-default-rtdb.asia-southeast1.firebasedatabase.app";

/* ── Firebase 헬퍼 ── */
const FB = {
  async get(path) {
    try {
      const r = await fetch(FIREBASE_URL + "/" + path + ".json");
      return r.ok ? await r.json() : null;
    } catch(e) { return null; }
  },
  async set(path, data) {
    try {
      await fetch(FIREBASE_URL + "/" + path + ".json", {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
    } catch(e) {}
  },
  async update(path, data) {
    try {
      await fetch(FIREBASE_URL + "/" + path + ".json", {
        method: "PATCH",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });
    } catch(e) {}
  },
  async remove(path) {
    try {
      await fetch(FIREBASE_URL + "/" + path + ".json", {method:"DELETE"});
    } catch(e) {}
  }
};

/* ── localStorage 헬퍼 ── */
const LS = {
  get: function(k, fb) {
    try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch(e) { return fb; }
  },
  set: function(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
  }
};

/* ── 이미지 압축 ── */
function compressFile(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      if (file.type.indexOf("video") === 0) {
        resolve({url: e.target.result, type: file.type});
        return;
      }
      var img = new Image();
      img.onload = function() {
        var MAX = 900;
        var w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({url: canvas.toDataURL("image/jpeg", 0.72), type: "image/jpeg"});
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function Av(props) {
  var src = props.src, emoji = props.emoji;
  var size = props.size || 52;
  var radius = props.radius || 16;
  var color = props.color || C.primary;
  return (
    <div style={{width:size,height:size,borderRadius:radius,background:color+"22",border:"2.5px solid "+color+"44",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.52,flexShrink:0}}>
      {src ? <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/> : emoji}
    </div>
  );
}

function Toast(props) {
  if (!props.msg) return null;
  return (
    <div style={{position:"fixed",top:18,left:"50%",background:C.navy,color:"#fff",padding:"11px 22px",borderRadius:20,fontSize:13,fontWeight:700,zIndex:9999,animation:"toast 2.6s ease forwards",whiteSpace:"nowrap",boxShadow:"0 8px 28px rgba(0,0,0,0.25)",pointerEvents:"none"}}>
      {props.msg}
    </div>
  );
}

function MediaView(props) {
  var items = props.mediaList || [];
  var emoji = props.emoji, color = props.color;
  var height = props.height || 220;
  if (items.length === 0) {
    return (
      <div style={{width:"100%",height:height,background:"linear-gradient(135deg,"+color+"18,"+color+"06)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:72,opacity:0.22}}>{emoji}</span>
      </div>
    );
  }
  if (items.length === 1) {
    var it = items[0];
    if (it.type && it.type.indexOf("video") === 0) {
      return <video src={it.url} controls playsInline style={{width:"100%",height:height,objectFit:"cover",display:"block",background:"#000"}}/>;
    }
    return <img src={it.url} style={{width:"100%",height:height,objectFit:"cover",display:"block"}} alt=""/>;
  }
  return (
    <div style={{overflowX:"auto",display:"flex",gap:6,scrollSnapType:"x mandatory"}}>
      {items.map(function(it, i) {
        return (
          <div key={i} style={{flexShrink:0,width:"82vw",maxWidth:400,scrollSnapAlign:"start",position:"relative",overflow:"hidden",borderRadius:i===0?"0":"12px"}}>
            {it.type && it.type.indexOf("video") === 0
              ? <video src={it.url} controls playsInline style={{width:"100%",height:height,objectFit:"cover",display:"block",background:"#000"}}/>

        );

  );
}

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={props.onClose}>

        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:8}}>🔒</div>
          <div style={{fontSize:17,fontWeight:900,color:C.navy}}>{user.name}님의 비밀번호</div>
          <div style={{fontSize:12,color:C.g400,marginTop:4}}>숫자 4자리를 입력하세요</div>
        </div>

        <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:16}}>
          {[0,1,2,3].map(function(i) {
            return (
              <div key={i} style={{width:52,height:52,borderRadius:16,border:"2.5px solid "+(error?C.primary:input.length>i?C.navy:C.g200),background:error?"#FFF0F0":input.length>i?C.navy:C.g100,display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>
                {input.length > i && <div style={{width:14,height:14,borderRadius:"50%",background:error?C.primary:C.white}}/>}
              </div>
            );
          })}
        </div>
        {error && <div style={{textAlign:"center",fontSize:13,color:C.primary,fontWeight:700,marginBottom:12}}>❌ 비밀번호가 틀렸어요</div>}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
          {digits.map(function(d, i) {
            if (d === "") return <div key={i}/>;
            return (
              <button key={i} className="btn" onClick={function(){press(d);}} style={{padding:"15px 8px",borderRadius:16,border:"1.5px solid "+C.g200,background:d==="⌫"?C.g100:C.white,fontSize:d==="⌫"?20:22,fontWeight:700,color:C.navy}}>
                {d}
              </button>
            );
          })}
        </div>
        <button className="btn" onClick={props.onVerify} style={{width:"100%",padding:"14px",borderRadius:16,border:"none",background:input.length===4?"linear-gradient(135deg,"+C.primary+","+C.gold+")":C.g200,color:input.length===4?"#fff":C.g400,fontSize:15,fontWeight:900}}>확인</button>
      </div>
    </div>
  );
}

function ManageModal(props) {
  var post = props.post;
  var [confirm, setConfirm] = useState(false);
  var m = JOB_META[post.tag] || {color:C.primary, emoji:"✨"};

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={props.onClose}>
      <div style={{background:C.white,borderRadius:"24px 24px 0 0",padding:"24px 18px 36px",width:"100%",maxWidth:480,animation:"slideUp 0.28s ease"}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,padding:"12px",background:C.g100,borderRadius:14}}>
          <div style={{width:40,height:40,borderRadius:12,background:m.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{m.emoji}</div>

              ✏️ 게시물 수정하기
            </button>
            <button className="btn" onClick={function(){setConfirm(true);}} style={{padding:"15px",borderRadius:16,border:"1.5px solid #FFCDD2",background:"#FFF5F5",color:"#E53935",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              🗑️ 게시물 삭제하기
            </button>
          </div>
        ) : (
          <div>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
              <div style={{fontSize:16,fontWeight:700,color:C.navy}}>정말 삭제할까요?</div>
              <div style={{fontSize:13,color:C.g400,marginTop:4}}>삭제하면 복구할 수 없어요</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={props.onClose} style={{flex:1,padding:"14px",borderRadius:14,border:"1px solid "+C.g200,background:C.white,color:C.g600,fontSize:14,fontWeight:700}}>취소</button>
              <button className="btn" onClick={function(){props.onDelete(post);}} style={{flex:1,padding:"14px",borderRadius:14,border:"none",background:"#E53935",color:"#fff",fontSize:14,fontWeight:900}}>삭제</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function EditModal(props) {
  var post = props.post;
  var [desc, setDesc] = useState(post.desc||"");
  var [tag, setTag] = useState(post.tag||JOB_TAGS[0]);
  var [progress, setProgress] = useState(post.progress||50);
  var tagColor = (JOB_META[tag]||{color:C.primary}).color;

  function save() { props.onSave(post.id, desc, tag, progress); }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,overflowY:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:20}}>
      <div style={{background:C.white,borderRadius:24,padding:"22px 18px 32px",width:"calc(100% - 28px)",maxWidth:480,animation:"fadeUp 0.28s ease",marginBottom:20}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:900,color:C.navy}}>✏️ 게시물 수정</div>
          <button className="btn" onClick={props.onClose} style={{background:C.g100,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,color:C.g600,fontWeight:700}}>닫기</button>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.g600,marginBottom:7}}>📝 내용</div>
          <textarea value={desc} onChange={function(e){setDesc(e.target.value);}} rows={5} style={{width:"100%",border:"none",outline:"none",fontSize:14,color:C.navy,resize:"none",background:"transparent",lineHeight:1.7}}/>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.g600,marginBottom:9}}>🏷️ 직무 태그</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {JOB_TAGS.map(function(t) {
              return (
                <button key={t} className="btn" onClick={function(){setTag(t);}} style={{padding:"6px 12px",borderRadius:11,border:"none",background:tag===t?C.primary:C.white,color:tag===t?"#fff":C.g600,fontWeight:tag===t?700:400,fontSize:12}}>
                  {(JOB_META[t]||{emoji:"✨"}).emoji} {t}
                </button>
              );
            })}
          </div>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:C.g600}}>📊 직무 숙련도</div>
            <span style={{fontSize:13,fontWeight:900,color:tagColor}}>{progress}점</span>
          </div>
          <input type="range" min="0" max="100" step="5" value={progress} onChange={function(e){setProgress(Number(e.target.value));}} style={{width:"100%",accentColor:tagColor,cursor:"pointer"}}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:10,color:C.g400}}>😅 처음</span>
            <span style={{fontSize:10,color:C.g400}}>🌟 완벽</span>
          </div>
        </div>
        <button className="btn" onClick={save} style={{width:"100%",padding:"16px",borderRadius:18,border:"none",background:"linear-gradient(135deg,"+C.primary+","+C.gold+")",color:"#fff",fontSize:15,fontWeight:900,boxShadow:"0 6px 18px rgba(255,107,53,0.35)"}}>
          ✅ 수정 완료
        </button>
      </div>
    </div>
  );
}

/* ───────────────────────────────────────
   메인 앱
─────────────────────────────────────── */
function App() {
  var [screen, setScreen]       = useState("splash");
  var [loginTab, setLoginTab]   = useState("new");
  var [userType, setUserType]   = useState(null);
  var [currentUser, setCurrentUser] = useState(function(){ return LS.get("dc_me", null); });

  // 가입 폼
  var [formName, setFormName]   = useState("");
  var [formSchool, setFormSchool] = useState("");
  var [formAvatar, setFormAvatar] = useState("👩");
  var [formPic, setFormPic]     = useState(null);
  var [formPin, setFormPin]     = useState("");

  // PIN 모달
  var [pinModal, setPinModal]   = useState(null);
  var [pinInput, setPinInput]   = useState("");
  var [pinError, setPinError]   = useState(false);

  // 기존 로그인 PIN
  var [existingPin, setExistingPin] = useState("");

  // 러브콜 알림
  var [lovecalls, setLovecalls] = useState([]);

  // 기업 담당자 가입 폼
  var [companyFormVisible, setCompanyFormVisible] = useState(false);
  var [companyFormName, setCompanyFormName] = useState("");

  // 게시물
  var [posts, setPosts]         = useState(DEMO_POSTS);
  var [postsReady, setPostsReady] = useState(false);
  var [liked, setLiked]         = useState(function(){ return LS.get("dc_liked", {}); });
  var [loved, setLoved]         = useState({});

  // 모달
  var [detail, setDetail]       = useState(null);
  var [commentModal, setCommentModal] = useState(null);
  var [loveModal, setLoveModal] = useState(null);
  var [manageModal, setManageModal] = useState(null);
  var [editModal, setEditModal] = useState(null);

  // 업로드
  var [mediaList, setMediaList] = useState([]);
  var [uploadDesc, setUploadDesc] = useState("");
  var [uploadTag, setUploadTag] = useState(JOB_TAGS[0]);
  var [uploadScore, setUploadScore] = useState(50);
  var [uploading, setUploading] = useState(false);

  // 피드/탐색
  var [activeTab, setActiveTab] = useState("feed");
  var [filterTag, setFilterTag] = useState("전체");
  var [searchQ, setSearchQ]     = useState("");

  // 내 정보
  var [showPortfolio, setShowPortfolio] = useState(false);
  var [showSettings, setShowSettings]   = useState(false);
  var [stName, setStName]     = useState("");
  var [stSchool, setStSchool] = useState("");
  var [stAvatar, setStAvatar] = useState("👩");
  var [stPic, setStPic]       = useState(null);

  // 토스트
  var [toastMsg, setToastMsg]   = useState(null);

  var fileRef      = useRef(null);
  var loginPicRef  = useRef(null);
  var settingsPicRef = useRef(null);

  /* ── 초기화 ── */
  useEffect(function() { setTimeout(function(){ setScreen("login"); }, 2000); }, []);

  useEffect(function() {
    FB.get("posts").then(function(data) {
      if (data) {
        var saved = Object.values(data);
        var savedIds = saved.map(function(p){ return p.id; });
        setPosts(saved.concat(DEMO_POSTS.filter(function(d){ return savedIds.indexOf(d.id) === -1; })));
      }
      setPostsReady(true);
    }).catch(function(){ setPostsReady(true); });

    var interval = setInterval(function() {
      FB.get("posts").then(function(data) {
        if (!data) return;
        var saved = Object.values(data);
        setPosts(function(prev) {
          var savedIds = saved.map(function(p){ return p.id; });
          var demos = prev.filter(function(p){ return ["d1","d2","d3"].indexOf(p.id) !== -1; });
          return saved.concat(demos.filter(function(d){ return savedIds.indexOf(d.id) === -1; }));
        });
      });
    }, 15000);
    return function(){ clearInterval(interval); };
  }, []);

  useEffect(function() { LS.set("dc_liked", liked); }, [liked]);

  // 러브콜 알림 로드 (학생 로그인 시)
  useEffect(function() {
    if (!currentUser || userType !== "student") return;
    FB.get("lovecalls/" + currentUser.id).then(function(data) {
      if (data) { setLovecalls(Object.values(data).reverse()); }
    });
  }, [currentUser, userType]);

  /* ── 파일 처리 ── */
  function pickFiles(e) {
    var files = Array.from(e.target.files);
    if (!files.length) return;
    Promise.all(files.map(compressFile)).then(function(results) {
      setMediaList(function(prev){ return prev.concat(results); });
    });
    e.target.value = "";
  }

  function pickSingle(e, onDone) {
    var file = e.target.files[0];
    if (!file) return;
    compressFile(file).then(function(r){ onDone(r.url); });
    e.target.value = "";
  }

  /* ── 회원가입 ── */
  function handleRegister() {
    if (!formName.trim()) { showToast("✏️ 이름을 입력해주세요!"); return; }
    if (formPin.length !== 4) { showToast("🔒 숫자 4자리 비밀번호를 설정해주세요!"); return; }
    FB.get("users").then(function(data) {
      var users = data ? Object.values(data) : [];
      var exist = users.find(function(u){ return u.name === formName.trim() && u.school === (formSchool.trim()||""); });
      if (exist) { showToast("이미 있는 계정이에요. 기존 계정 로그인을 이용해주세요!"); setLoginTab("existing"); return; }
      var newUser = {id:"u"+Date.now(), name:formName.trim(), school:formSchool.trim(), avatar:formAvatar, pic:formPic, pin:formPin};
      FB.set("users/"+newUser.id, newUser);
      LS.set("dc_me", newUser);
      setCurrentUser(newUser); setUserType("student"); setScreen("main");
      showToast("🎉 환영해요, "+newUser.name+"님!");
    });
  }

  /* ── PIN 모달 열기 ── */
  function openPin(user) {
    setPinInput(""); setPinError(false);
    setPinModal({
      user: user,
      onSuccess: function() {
        LS.set("dc_me", user);
        setCurrentUser(user); setUserType("student"); setScreen("main");
        setPinModal(null); setPinInput(""); setPinError(false);
        showToast("👋 반가워요, "+user.name+"님!");
      }
    });
  }

  function verifyPin() {
    if (!pinModal) return;
    if (pinInput === pinModal.user.pin) { pinModal.onSuccess(); }
    else { setPinError(true); setPinInput(""); setTimeout(function(){ setPinError(false); }, 1400); }
  }

  function handleExistingLogin() {
    if (!formName.trim()) { showToast("✏️ 이름을 입력해주세요!"); return; }
    if (existingPin.length !== 4) { showToast("🔒 비밀번호 4자리를 입력해주세요!"); return; }
    FB.get("users").then(function(data) {
      var users = data ? Object.values(data) : [];
      var found = users.find(function(u){ return u.name === formName.trim() && u.school === (formSchool.trim()||""); });
      if (!found) { showToast("❌ 일치하는 계정이 없어요. 새로 가입해주세요!"); return; }
      if (found.pin !== existingPin) { showToast("❌ 비밀번호가 틀렸어요!"); setExistingPin(""); return; }
      LS.set("dc_me", found);
      setCurrentUser(found); setUserType("student"); setScreen("main");
      showToast("👋 반가워요, "+found.name+"님!");
    });
  }

  /* ── 업로드 ── */
  function handleUpload() {
    if (!uploadDesc.trim() && mediaList.length === 0) { showToast("📝 사진이나 내용을 추가해주세요!"); return; }
    setUploading(true);
    var newPost = {
      id: "u"+Date.now(),
      userId: currentUser ? currentUser.id : "anon",
      name: currentUser ? currentUser.name : "나",
      school: currentUser ? (currentUser.school||"") : "",
      avatar: currentUser ? currentUser.avatar : "👩",
      profilePic: currentUser ? (currentUser.pic||null) : null,
      tag: uploadTag,
      desc: uploadDesc,
      likes: 0,
      commentList: [],
      time: "방금 전",
      mediaList: mediaList.slice(),
      progress: uploadScore
    };
    FB.set("posts/"+newPost.id, newPost).then(function() {
      setPosts(function(prev){ return [newPost].concat(prev); });
      setMediaList([]); setUploadDesc(""); setUploadScore(50); setUploading(false);
      showToast("🎉 업로드 완료! 오늘도 최고예요!");
      setActiveTab("feed");
    });
  }

  /* ── 댓글 ── */
  function handleCommentSubmit(postId, comment) {
    var post = posts.find(function(p){ return p.id === postId; });
    if (!post) return;
    var newList = (post.commentList||[]).concat([comment]);
    setPosts(function(prev){ return prev.map(function(p){ return p.id===postId ? Object.assign({},p,{commentList:newList}) : p; }); });
    setCommentModal(function(prev){ return prev && prev.id===postId ? Object.assign({},prev,{commentList:newList}) : prev; });
    if (detail && detail.id === postId) setDetail(function(d){ return Object.assign({},d,{commentList:newList}); });
    FB.update("posts/"+postId, {commentList:newList});
  }

  /* ── 삭제 ── */
  function handleDelete(post) {
    setPosts(function(prev){ return prev.filter(function(p){ return p.id !== post.id; }); });
    setManageModal(null);
    if (detail && detail.id === post.id) setDetail(null);
    FB.remove("posts/"+post.id);
    showToast("🗑️ 게시물이 삭제됐어요.");
  }

  /* ── 수정 ── */
  function handleEditSave(postId, desc, tag, progress) {
    var updated = posts.find(function(p){ return p.id === postId; });
    if (!updated) return;
    updated = Object.assign({}, updated, {desc:desc, tag:tag, progress:progress});
    setPosts(function(prev){ return prev.map(function(p){ return p.id===postId ? updated : p; }); });
    if (detail && detail.id === postId) setDetail(updated);
    setEditModal(null);
    FB.update("posts/"+postId, {desc:desc, tag:tag, progress:progress});
    showToast("✅ 게시물이 수정됐어요!");
  }

  /* ── 설정 저장 ── */
  function saveSettings() {
    var updated = Object.assign({}, currentUser, {name:stName, school:stSchool, avatar:stAvatar, pic:stPic});
    FB.set("users/"+updated.id, updated);
    LS.set("dc_me", updated);
    setCurrentUser(updated);
    setPosts(function(prev){ return prev.map(function(p){ return p.userId===updated.id ? Object.assign({},p,{name:updated.name,school:updated.school,avatar:updated.avatar,profilePic:updated.pic}) : p; }); });
    setShowSettings(false);
    showToast("✅ 프로필이 저장됐어요!");
  }

  /* ── 좋아요 ── */
  function handleLike(id) {
    setLiked(function(prev) {
      var next = Object.assign({}, prev, {[id]: !prev[id]});
      return next;
    });
    if (!liked[id]) showToast("💛 응원을 보냈어요!");
  }

  function showToast(msg) {
    setToastMsg(null);
    requestAnimationFrame(function() {
      setToastMsg(msg);
      setTimeout(function(){ setToastMsg(null); }, 2700);
    });
  }

  /* ─────── SPLASH ─────── */
  if (screen === "splash") {
    return (
      <div style={{width:"100%",height:"100vh",background:"linear-gradient(145deg,"+C.primary+","+C.gold+")",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:76,animation:"pulse 2s ease-in-out infinite",marginBottom:22}}>✨</div>
        <div style={{color:"#fff",fontSize:38,fontWeight:900,letterSpacing:-1.5,animation:"fadeUp 0.7s ease forwards"}}>드림 커리어</div>
        <div style={{color:"rgba(255,255,255,0.82)",fontSize:15,marginTop:8,animation:"fadeUp 0.7s 0.28s ease forwards",opacity:0}}>말이 아닌 행동으로 증명하다</div>
        <div style={{marginTop:50,fontSize:12,color:"rgba(255,255,255,0.5)",padding:"6px 14px",borderRadius:20,border:"1px solid rgba(255,255,255,0.3)"}}>
          {FIREBASE_URL.indexOf("dream-career-demo") !== -1 ? "🔴 데모 모드" : "🟢 서버 연결됨"}
        </div>
      </div>
    );
  }

  /* ─────── LOGIN ─────── */
  if (screen === "login") {
    var savedUsers = LS.get("dc_users_cache", []);
    return (
      <div style={{width:"100%",minHeight:"100vh",background:C.surface,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"28px 20px 52px"}}>
        <Toast msg={toastMsg}/>

        <div style={{animation:"fadeUp 0.5s ease forwards",textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>✨</div>
          <div style={{fontSize:27,fontWeight:900,color:C.navy,letterSpacing:-1}}>드림 커리어</div>
          <div style={{fontSize:13,color:C.g400,marginTop:4}}>장애학생의 빛나는 순간을 세상에</div>
        </div>

        <div style={{width:"100%",maxWidth:400,animation:"fadeUp 0.5s 0.15s ease forwards",opacity:0}}>
          <div style={{background:C.white,borderRadius:24,padding:"20px 18px",marginBottom:12,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <span style={{fontSize:20}}>🎓</span>
              <span style={{fontSize:15,fontWeight:700,color:C.navy}}>학생 계정</span>
            </div>

            <div style={{display:"flex",background:C.g100,borderRadius:14,padding:4,marginBottom:16,gap:4}}>
              {[["new","새로 시작하기"],["existing","기존 계정 로그인"]].map(function(item) {
                return (
                  <button key={item[0]} className="btn" onClick={function(){setLoginTab(item[0]);}} style={{flex:1,padding:"9px 4px",borderRadius:11,border:"none",background:loginTab===item[0]?C.white:"transparent",color:loginTab===item[0]?C.navy:C.g400,fontWeight:loginTab===item[0]?700:400,fontSize:12,boxShadow:loginTab===item[0]?"0 2px 8px rgba(0,0,0,0.08)":"none"}}>
                    {item[1]}
                  </button>
                );
              })}
            </div>

            {loginTab === "new" ? (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                  <div style={{position:"relative",flexShrink:0}}>
                    <div style={{width:60,height:60,borderRadius:18,background:C.primary+"22",border:"2px solid "+C.primary+"44",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>
                      {formPic ? <img src={formPic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/> : formAvatar}
                    </div>
                    <input ref={loginPicRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){ pickSingle(e, function(url){ setFormPic(url); }); }}/>
                    <button className="btn" onClick={function(){loginPicRef.current.click();}} style={{position:"absolute",bottom:-4,right:-4,width:22,height:22,borderRadius:7,background:C.primary,border:"2.5px solid white",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:C.g400,marginBottom:6}}>아이콘 선택</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {AVATARS.map(function(a) {
                        return (
                          <button key={a} className="btn" onClick={function(){setFormAvatar(a);setFormPic(null);}} style={{width:30,height:30,borderRadius:9,border:"2px solid "+(formAvatar===a&&!formPic?C.primary:C.g200),background:formAvatar===a&&!formPic?C.soft:C.white,fontSize:16}}>
                            {a}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
                <input placeholder="✏️ 이름  예) 김민서" value={formName} onChange={function(e){setFormName(e.target.value);}} style={{width:"100%",border:"1.5px solid "+(formName?C.primary:C.g200),borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100}}/>
                <input placeholder="🏫 학교 및 학년  예) 한빛특수학교 3학년" value={formSchool} onChange={function(e){setFormSchool(e.target.value);}} style={{width:"100%",border:"1.5px solid "+C.g200,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100}}/>
                <div style={{position:"relative",marginBottom:14}}>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="🔒 비밀번호 4자리 설정" value={formPin} onChange={function(e){setFormPin(e.target.value.replace(/\D/g,"").slice(0,4));}} style={{width:"100%",border:"1.5px solid "+(formPin.length===4?C.primary:C.g200),borderRadius:12,padding:"11px 13px",fontSize:formPin.length>0?20:14,letterSpacing:formPin.length>0?"8px":"0",color:C.navy,outline:"none",background:C.g100}}/>
                  <span style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",fontSize:12,color:C.g400}}>{formPin.length}/4</span>
                </div>
                <button className="btn" onClick={handleRegister} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,"+C.primary+","+C.gold+")",color:"#fff",fontSize:14,fontWeight:900,boxShadow:"0 5px 18px rgba(255,107,53,0.32)"}}>포트폴리오 시작하기 →</button>
              </div>
            ) : (
              <div>
                <div style={{fontSize:11,color:C.g400,marginBottom:10,fontWeight:600}}>🌐 가입된 계정 — 이름·학교·비밀번호 입력 후 로그인</div>
                <input placeholder="✏️ 이름" value={formName} onChange={function(e){setFormName(e.target.value);}} style={{width:"100%",border:"1.5px solid "+(formName?C.primary:C.g200),borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100}}/>
                <input placeholder="🏫 학교 및 학년" value={formSchool} onChange={function(e){setFormSchool(e.target.value);}} style={{width:"100%",border:"1.5px solid "+C.g200,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100}}/>
                <div style={{position:"relative",marginBottom:14}}>
                  <input type="password" inputMode="numeric" maxLength={4} placeholder="🔒 비밀번호 4자리" value={existingPin} onChange={function(e){setExistingPin(e.target.value.replace(/\D/g,"").slice(0,4));}} style={{width:"100%",border:"1.5px solid "+(existingPin.length===4?C.primary:C.g200),borderRadius:12,padding:"11px 13px",fontSize:existingPin.length>0?20:14,letterSpacing:existingPin.length>0?"8px":"0",color:C.navy,outline:"none",background:C.g100}}/>
                  <span style={{position:"absolute",right:13,top:"50%",transform:"translateY(-50%)",fontSize:12,color:C.g400}}>{existingPin.length}/4</span>
                </div>
                <button className="btn" onClick={handleExistingLogin} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,"+C.primary+","+C.gold+")",color:"#fff",fontSize:14,fontWeight:900,boxShadow:"0 5px 18px rgba(255,107,53,0.32)"}}>로그인 →</button>
              </div>
            )}
          </div>

          {!companyFormVisible ? (
            <button className="btn" onClick={function(){setCompanyFormVisible(true);}} style={{width:"100%",background:C.white,borderRadius:18,padding:"15px 18px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:14,border:"2px solid "+C.accent+"22"}}>
              <span style={{fontSize:22}}>🏢</span>
              <div style={{flex:1,textAlign:"left"}}>
                <div style={{fontSize:14,fontWeight:700,color:C.navy}}>기업 담당자로 시작하기</div>
                <div style={{fontSize:12,color:C.g400}}>인재를 발견하고 러브콜을 보내요</div>
              </div>
              <span style={{color:C.g400,fontSize:18}}>›</span>
            </button>
          ) : (
            <div style={{background:C.white,borderRadius:18,padding:"18px 18px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"2px solid "+C.accent+"33"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
                <span style={{fontSize:20}}>🏢</span>
                <span style={{fontSize:15,fontWeight:700,color:C.navy}}>기업 담당자 가입</span>
              </div>
              <input placeholder="✏️ 담당자 이름 입력  예) 홍길동" value={companyFormName} onChange={function(e){setCompanyFormName(e.target.value);}} style={{width:"100%",border:"1.5px solid "+(companyFormName?C.accent:C.g200),borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:10,background:C.g100}}/>
              <div style={{display:"flex",gap:8}}>
                <button className="btn" onClick={function(){
                  if (!companyFormName.trim()) { showToast("✏️ 이름을 입력해주세요!"); return; }
                  var compUser = {id:"co"+Date.now(), name:companyFormName.trim(), role:"company"};
                  LS.set("dc_company", compUser);
                  setCurrentUser(compUser); setUserType("company"); setScreen("main");
                  showToast("🏢 환영해요, "+compUser.name+"님!");
                }} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:"linear-gradient(135deg,"+C.accent+",#52B788)",color:"#fff",fontSize:14,fontWeight:900}}>입장하기 →</button>
                <button className="btn" onClick={function(){setCompanyFormVisible(false);setCompanyFormName("");}} style={{padding:"12px 14px",borderRadius:12,border:"1px solid "+C.g200,background:C.white,color:C.g600,fontSize:13,fontWeight:600}}>취소</button>
              </div>
            </div>
          )}
        </div>

        {pinModal && (
          <PinModal user={pinModal.user} input={pinInput} error={pinError}
            onInput={function(v){ setPinInput(v); setPinError(false); }}
            onVerify={verifyPin} onClose={function(){ setPinModal(null); }}/>
        )}
      </div>
    );
  }

  /* ─────── DETAIL ─────── */
  if (detail) {
    var s = detail;
    var dm = JOB_META[s.tag] || {color:C.primary, emoji:"✨"};
    var tagPosts = posts.filter(function(p){ return p.tag===s.tag && (p.mediaList||[]).length>0; });
    return (
      <div style={{width:"100%",minHeight:"100vh",background:C.surface,maxWidth:520,margin:"0 auto"}}>
        <Toast msg={toastMsg}/>
        <div style={{background:"linear-gradient(135deg,"+dm.color+"1e,"+C.primary+"09)",padding:"52px 16px 20px",position:"relative"}}>
          <button className="btn" onClick={function(){setDetail(null);}} style={{position:"absolute",top:14,left:14,background:"rgba(255,255,255,0.92)",border:"none",borderRadius:12,padding:"7px 16px",fontWeight:700,fontSize:13,color:C.navy}}>← 돌아가기</button>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <Av src={s.profilePic} emoji={s.avatar} size={68} radius={21} color={dm.color}/>
            <div>
              <div style={{fontSize:20,fontWeight:900,color:C.navy}}>{s.name}</div>
              <div style={{fontSize:12,color:C.g400,marginTop:2}}>{s.school}</div>
              <div style={{marginTop:8}}>
                <span style={{background:dm.color,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700}}>{s.tag.replace("#","")}</span>
              </div>
            </div>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,padding:"14px 14px 0"}}>
          {[["받은 응원", s.likes+(liked[s.id]?1:0)], ["댓글", (s.commentList||[]).length], ["숙련도", s.progress+"점"]].map(function(item) {
            return (
              <div key={item[0]} style={{background:C.white,borderRadius:14,padding:"14px 8px",textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
                <div style={{fontSize:20,fontWeight:900,color:C.navy}}>{item[1]}</div>
                <div style={{fontSize:11,color:C.g400,marginTop:2}}>{item[0]}</div>
              </div>
            );
          })}
        </div>

        <div style={{margin:"14px 14px 0",borderRadius:18,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
          <MediaView mediaList={s.mediaList} emoji={dm.emoji} color={dm.color} height={260}/>
        </div>

        <div style={{margin:"12px 14px",background:C.white,borderRadius:16,padding:"14px",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
          <div style={{fontSize:14,color:C.g600,lineHeight:1.7}}>{s.desc}</div>
        </div>

        <div style={{margin:"0 14px 12px"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.navy,marginBottom:10}}>🎬 {s.tag} 작업 갤러리</div>
          {tagPosts.length === 0 ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {[0,1,2,3,4,5,6,7,8].map(function(i){ return <div key={i} style={{aspectRatio:"1",borderRadius:12,background:dm.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,opacity:0.4}}>{dm.emoji}</div>; })}
            </div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {tagPosts.reduce(function(acc, p) {
                return acc.concat((p.mediaList||[]).map(function(item){ return {item:item, p:p}; }));
              }, []).map(function(obj, idx) {
                return (
                  <div key={idx} onClick={function(){setDetail(obj.p);}} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",cursor:"pointer",position:"relative"}}>
                    {obj.item.type && obj.item.type.indexOf("video")===0
                      ? <video src={obj.item.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      : <img src={obj.item.url} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>}
                    <div style={{position:"absolute",bottom:4,left:4,fontSize:9,color:"#fff",fontWeight:700,background:"rgba(0,0,0,0.45)",borderRadius:5,padding:"2px 5px"}}>{obj.p.name}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div style={{height:100}}/>

        {userType === "company" && (
          <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 28px)",maxWidth:492}}>
            <button className="btn" onClick={function(){if(!loved[s.id]) setLoveModal(s);}} style={{width:"100%",padding:"16px",borderRadius:20,border:"none",background:loved[s.id]?C.g200:"linear-gradient(135deg,"+C.primary+","+C.gold+")",color:loved[s.id]?C.g400:"#fff",fontSize:15,fontWeight:900,boxShadow:loved[s.id]?"none":"0 8px 24px rgba(255,107,53,0.38)"}}>
              {loved[s.id] ? "✅ 러브콜 발송 완료" : "💌 "+s.name+" 학생에게 러브콜 보내기"}
            </button>
          </div>
        )}

        {commentModal && <CommentModal post={commentModal} currentUser={currentUser} onClose={function(){setCommentModal(null);}} onSubmit={handleCommentSubmit}/>}
        {loveModal && <LoveModal post={loveModal} onClose={function(){setLoveModal(null);}} onSend={function(p){
          setLoved(function(v){return Object.assign({},v,{[p.id]:true});});
          setLoveModal(null);
          showToast("💌 "+p.name+" 학생에게 러브콜을 보냈어요!");
          var callData = {from: currentUser ? currentUser.name : "기업담당자", tag: p.tag, postId: p.id, time: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})};
          FB.set("lovecalls/"+p.userId+"/lc"+Date.now(), callData);
        }}/>}
      </div>
    );
  }

  /* ─────── MAIN ─────── */
  var tabs = [
    {id:"feed",  icon:"🏠", label:"피드"},
    {id:"search",icon:"🔍", label:"탐색"},
    {id:"upload",icon:"➕", label:"업로드"},
    {id:"notify",icon:"🔔", label:"알림"},
    {id:"profile",icon:"👤",label:"내 정보"}
  ];

  var filtered = filterTag === "전체" ? posts : posts.filter(function(p){ return p.tag === filterTag; });

  function makePostCard(post, i) {
    return (
      <div key={post.id} style={{animation:"fadeUp 0.42s "+Math.min(i,4)*0.07+"s ease forwards",opacity:0}}>
        <PostCard post={post} liked={!!liked[post.id]} loved={!!loved[post.id]} userType={userType} currentUserId={currentUser?currentUser.id:null}
          onLike={handleLike}
          onLove={function(p){setLoveModal(p);}}
          onOpen={function(p){setDetail(p);}}
          onComment={function(p){setCommentModal(p);}}
          onManage={function(p){setManageModal(p);}}/>
      </div>
    );
  }

  return (
    <div style={{width:"100%",minHeight:"100vh",background:C.surface,maxWidth:520,margin:"0 auto"}}>
      <Toast msg={toastMsg}/>

      {/* 상단 네비 */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(250,250,248,0.95)",backdropFilter:"blur(12px)",padding:"13px 16px 9px",borderBottom:"1px solid "+C.g200,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:18}}>✨</span>
          <span style={{fontSize:19,fontWeight:900,color:C.primary,letterSpacing:-0.5}}>드림 커리어</span>
        </div>
        <span style={{background:userType==="company"?C.accent:C.primary,color:"#fff",borderRadius:10,padding:"4px 11px",fontSize:11,fontWeight:700}}>
          {userType==="company" ? "🏢 기업" : "🎓 "+(currentUser?currentUser.name:"학생")}
        </span>
      </div>

      {/* ── 피드 ── */}
      {activeTab === "feed" && (
        <div style={{padding:"12px 13px 100px"}}>
          <div style={{borderRadius:22,background:"linear-gradient(135deg,"+C.navy+","+C.mid+")",padding:"18px 18px",color:"#fff",marginBottom:13}}>
            <div style={{fontSize:11,fontWeight:700,color:C.gold,marginBottom:4,letterSpacing:1}}>THIS WEEK</div>
            <div style={{fontSize:18,fontWeight:900,lineHeight:1.4}}>이번 주 <span style={{color:C.gold}}>3명</span>이 러브콜을 받았어요 💌</div>
          </div>
          <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:13,paddingBottom:2}}>
            {["전체"].concat(JOB_TAGS).map(function(f) {
              return (
                <button key={f} className="btn" onClick={function(){setFilterTag(f);}} style={{whiteSpace:"nowrap",padding:"7px 13px",borderRadius:20,border:"none",background:filterTag===f?C.primary:C.white,color:filterTag===f?"#fff":C.g600,fontWeight:filterTag===f?700:400,fontSize:12,boxShadow:filterTag===f?"0 3px 10px rgba(255,107,53,0.3)":"0 2px 6px rgba(0,0,0,0.05)"}}>
                  {f==="전체" ? "전체" : ((JOB_META[f]||{emoji:"✨"}).emoji+" "+f)}
                </button>
              );
            })}
          </div>
          {!postsReady && <div style={{textAlign:"center",padding:"48px 20px",color:C.g400}}><div style={{display:"inline-block",width:28,height:28,border:"3px solid "+C.g200,borderTopColor:C.primary,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:12}}/><div style={{fontSize:13}}>게시물 불러오는 중...</div></div>}
          {postsReady && filtered.map(makePostCard)}
          {postsReady && filtered.length===0 && <div style={{textAlign:"center",padding:"56px 20px",color:C.g400}}><div style={{fontSize:40,marginBottom:12}}>🔍</div><div style={{fontSize:14,fontWeight:600}}>게시물이 없어요</div></div>}
        </div>
      )}

      {/* ── 탐색 ── */}
      {activeTab === "search" && (function() {
        var q = searchQ.trim().toLowerCase();
        var results = q ? posts.filter(function(p){ return p.tag.toLowerCase().indexOf(q)!==-1 || (p.school||"").toLowerCase().indexOf(q)!==-1 || p.name.toLowerCase().indexOf(q)!==-1; }) : [];
        return (
          <div style={{padding:"14px",paddingBottom:100}}>
            <div style={{background:C.white,borderRadius:16,padding:"11px 14px",display:"flex",gap:9,alignItems:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.07)",marginBottom:12,border:"1.5px solid "+(searchQ?C.primary:C.g200)}}>
              <span style={{fontSize:17}}>🔍</span>
              <input value={searchQ} onChange={function(e){setSearchQ(e.target.value);}} placeholder="직무태그 또는 학교명으로 검색" style={{flex:1,border:"none",outline:"none",fontSize:13,color:C.navy,background:"transparent"}}/>
              {searchQ && <button className="btn" onClick={function(){setSearchQ("");}} style={{background:"none",border:"none",color:C.g400,fontSize:16,padding:"0 2px"}}>✕</button>}
            </div>
            <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:18,paddingBottom:2}}>
              {JOB_TAGS.map(function(t) {
                return (
                  <button key={t} className="btn" onClick={function(){setSearchQ(t.replace("#",""));}} style={{whiteSpace:"nowrap",padding:"6px 12px",borderRadius:20,border:"none",background:searchQ===t.replace("#","")?C.primary:C.g100,color:searchQ===t.replace("#","")?C.white:C.g600,fontSize:11,fontWeight:600}}>
                    {(JOB_META[t]||{emoji:"✨"}).emoji} {t}
                  </button>
                );
              })}
            </div>
            {q ? (
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>🔎 "{searchQ}" — {results.length}건</div>
                {results.length===0
                  ? <div style={{textAlign:"center",padding:"48px 20px",color:C.g400}}><div style={{fontSize:40,marginBottom:10}}>🙈</div><div style={{fontSize:14,fontWeight:600}}>일치하는 게시물이 없어요</div></div>
                  : results.map(makePostCard)}
              </div>
            ) : (
              <div>
                <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>📊 직무별 현황</div>
                {[["바리스타",23,"#8B4513"],["급식보조",18,"#2E7D5A"],["예술",15,"#AD1457"],["행정보조",12,"#1B5E20"],["원예",9,"#2E7D32"]].map(function(item) {
                  return (
                    <div key={item[0]} onClick={function(){setSearchQ(item[0]);}} style={{background:C.white,borderRadius:14,padding:"13px 14px",marginBottom:8,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.navy}}>{item[0]}</div>
                        <div style={{height:6,background:C.g100,borderRadius:3,marginTop:5,overflow:"hidden"}}><div style={{height:"100%",width:(item[1]/35*100)+"%",background:item[2],borderRadius:3}}/></div>
                      </div>
                      <span style={{fontSize:14,fontWeight:900,color:item[2]}}>{item[1]}명</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {/* ── 업로드 ── */}
      {activeTab === "upload" && (
        <div style={{padding:"20px 14px 130px"}}>
          <div style={{fontSize:20,fontWeight:900,color:C.navy,marginBottom:3}}>✨ 오늘의 기록 남기기</div>
          <div style={{fontSize:13,color:C.g400,marginBottom:18}}>당신의 빛나는 순간을 세상에 보여주세요!</div>

          <input ref={fileRef} type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={pickFiles}/>

          {mediaList.length > 0 ? (
            <div style={{marginBottom:14}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:6}}>
                {mediaList.map(function(item, i) {
                  return (
                    <div key={i} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",position:"relative"}}>
                      {item.type && item.type.indexOf("video")===0
                        ? <video src={item.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                        : <img src={item.url} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>}
                      <button className="btn" onClick={function(){setMediaList(function(p){return p.filter(function(_,j){return j!==i;});});}} style={{position:"absolute",top:4,right:4,width:20,height:20,borderRadius:6,background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                    </div>
                  );
                })}
                <button className="btn" onClick={function(){fileRef.current.click();}} style={{aspectRatio:"1",borderRadius:12,border:"2px dashed "+C.primary+"55",background:C.soft,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:22}}>➕</span>
                  <span style={{fontSize:10,color:C.primary,fontWeight:700}}>추가</span>
                </button>
              </div>
              <div style={{fontSize:11,color:C.g400,textAlign:"center"}}>📷 {mediaList.length}개 선택됨</div>
            </div>
          ) : (
            <button className="btn" onClick={function(){fileRef.current.click();}} style={{width:"100%",padding:"32px 20px",borderRadius:22,border:"2.5px dashed "+C.primary+"55",background:"linear-gradient(135deg,"+C.primary+"08,"+C.gold+"08)",textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:48,marginBottom:8}}>📸</div>
              <div style={{fontSize:15,fontWeight:700,color:C.navy}}>사진 / 영상 선택하기</div>
              <div style={{fontSize:12,color:C.g400,marginTop:4}}>여러 장 동시 선택 가능해요!</div>
            </button>
          )}

          <div style={{background:C.white,borderRadius:18,padding:"14px 16px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:8}}>✏️ 오늘 어떤 작업을 했나요?</div>
            <textarea placeholder="연습한 내용, 느낀 점을 자유롭게 써보세요 😊" value={uploadDesc} onChange={function(e){setUploadDesc(e.target.value);}} rows={5} style={{width:"100%",border:"none",outline:"none",fontSize:14,color:C.navy,resize:"none",background:"transparent",lineHeight:1.7}}/>
            <div style={{fontSize:11,color:C.g400,textAlign:"right"}}>{uploadDesc.length}자</div>
          </div>

          <div style={{background:C.white,borderRadius:18,padding:"14px 16px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>🏷️ 직무 태그</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {JOB_TAGS.map(function(t) {
                return (
                  <button key={t} className="btn" onClick={function(){setUploadTag(t);}} style={{padding:"7px 13px",borderRadius:12,border:"none",background:uploadTag===t?C.primary:C.g100,color:uploadTag===t?"#fff":C.g600,fontWeight:uploadTag===t?700:400,fontSize:12}}>
                    {(JOB_META[t]||{emoji:"✨"}).emoji} {t}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{background:C.white,borderRadius:18,padding:"16px 16px 18px",marginBottom:20,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:3}}>📊 오늘 내 직무 숙련도는?</div>
            <div style={{fontSize:12,color:C.g400,marginBottom:12}}>솔직하게 자기평가 해보세요!</div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:11,color:C.g400}}>😅 배우는 중</span>
              <span style={{fontSize:15,fontWeight:900,color:(JOB_META[uploadTag]||{color:C.primary}).color}}>{uploadScore}점</span>
              <span style={{fontSize:11,color:C.g400}}>🌟 완벽해요</span>
            </div>
            <input type="range" min="0" max="100" step="5" value={uploadScore} onChange={function(e){setUploadScore(Number(e.target.value));}} style={{width:"100%",accentColor:(JOB_META[uploadTag]||{color:C.primary}).color,cursor:"pointer"}}/>
            <div style={{marginTop:12,display:"flex",gap:5}}>
              {[[20,"😅","처음"],[40,"🙂","조금"],[60,"😊","어느정도"],[80,"💪","잘함"],[100,"🌟","완벽"]].map(function(item) {
                var tc = (JOB_META[uploadTag]||{color:C.primary}).color;
                return (
                  <button key={item[0]} className="btn" onClick={function(){setUploadScore(item[0]);}} style={{flex:1,padding:"6px 2px",borderRadius:10,border:"1.5px solid "+(uploadScore>=item[0]?tc:C.g200),background:uploadScore>=item[0]?tc+"18":C.white,fontSize:10,color:C.navy,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span style={{fontSize:15}}>{item[1]}</span>
                    <span style={{fontSize:9,color:C.g400,textAlign:"center",lineHeight:1.2}}>{item[2]}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <button className="btn" onClick={handleUpload} disabled={uploading} style={{width:"100%",padding:"17px",borderRadius:20,border:"none",background:uploading?C.g200:"linear-gradient(135deg,"+C.primary+","+C.gold+")",color:uploading?C.g400:"#fff",fontSize:16,fontWeight:900,boxShadow:uploading?"none":"0 8px 24px rgba(255,107,53,0.38)"}}>
            {uploading
              ? <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}><span style={{display:"inline-block",width:16,height:16,border:"2.5px solid #ccc",borderTopColor:C.primary,borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>업로드 중...</span>
              : "🚀 포트폴리오에 업로드하기"}
          </button>
        </div>
      )}

      {/* ── 알림 ── */}
      {activeTab === "notify" && (
        <div style={{padding:"14px",paddingBottom:100}}>
          <div style={{fontSize:17,fontWeight:900,color:C.navy,marginBottom:14}}>🔔 알림</div>
          {userType === "student" && lovecalls.length > 0 ? (
            lovecalls.map(function(n, i) {
              return (
                <div key={i} style={{background:C.white,borderRadius:16,padding:"14px",marginBottom:9,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",gap:12,alignItems:"flex-start",animation:"fadeUp 0.4s "+i*0.07+"s ease forwards",opacity:0}}>
                  <div style={{width:42,height:42,borderRadius:13,background:C.primary+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>💌</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.navy,lineHeight:1.5}}><span style={{color:C.primary}}>{n.from}</span>에서 러브콜을 보냈어요!</div>
                    <div style={{fontSize:11,color:C.g400,marginTop:2}}>{n.tag} 게시물 · {n.time}</div>
                  </div>
                </div>
              );
            })
          ) : userType === "student" && lovecalls.length === 0 ? (
            <div style={{textAlign:"center",padding:"52px 20px",color:C.g400}}>
              <div style={{fontSize:44,marginBottom:12}}>💌</div>
              <div style={{fontSize:14,fontWeight:600,color:C.navy,marginBottom:6}}>아직 러브콜이 없어요</div>
              <div style={{fontSize:12}}>포트폴리오를 꾸준히 올리면<br/>기업 담당자의 눈에 띌 거예요!</div>
            </div>
          ) : (
            [{icon:"💛",text:"피드에서 학생 게시물을 확인해보세요!",sub:"러브콜을 보낼 수 있어요",time:"",col:C.gold}].map(function(n, i) {
              return (
                <div key={i} style={{background:C.white,borderRadius:16,padding:"14px",marginBottom:9,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:42,height:42,borderRadius:13,background:n.col+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{n.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:C.navy,lineHeight:1.5}}>{n.text}</div>
                    <div style={{fontSize:11,color:C.g400,marginTop:2}}>{n.sub}</div>
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}

      {/* ── 내 정보 ── */}
      {activeTab === "profile" && (
        <div style={{paddingBottom:100}}>
          <div style={{background:"linear-gradient(135deg,"+C.primary+"18,"+C.gold+"0a)",padding:"22px 16px 18px"}}>
            <div style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:16}}>
              <div style={{position:"relative"}}>
                <Av src={currentUser?currentUser.pic:null} emoji={userType==="company"?"🏢":(currentUser?currentUser.avatar:"👩")} size={68} radius={21} color={C.primary}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:18,fontWeight:900,color:C.navy}}>{userType==="company"?"기업 담당자":(currentUser?currentUser.name:"이름 미설정")}</div>
                <div style={{fontSize:12,color:C.g400,marginTop:2}}>{userType==="company"?"채용 담당자":(currentUser?currentUser.school:"")}</div>
                <span style={{display:"inline-block",marginTop:8,background:C.white,borderRadius:10,padding:"4px 12px",fontSize:12,color:C.navy,fontWeight:700,boxShadow:"0 2px 6px rgba(0,0,0,0.06)"}}>
                  게시물 {posts.filter(function(p){ return currentUser && p.userId===currentUser.id; }).length}개
                </span>
              </div>
            </div>
          </div>

          <div style={{padding:"14px 14px 0"}}>
            {/* 내 포트폴리오 */}
            <div>
              <div className="card" onClick={function(){setShowPortfolio(function(v){return !v;});}} style={{background:C.white,borderRadius:14,padding:"14px",marginBottom:showPortfolio?0:9,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <span style={{fontSize:20}}>📁</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.navy}}>내 포트폴리오</div>
                  <div style={{fontSize:12,color:C.g400}}>{posts.filter(function(p){ return currentUser && p.userId===currentUser.id; }).length}개의 업로드 기록</div>
                </div>
                <span style={{color:C.g400,fontSize:16,transform:showPortfolio?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>
              </div>
              {showPortfolio && (function() {
                var myPosts = posts.filter(function(p){ return currentUser && p.userId===currentUser.id; });
                return (
                  <div style={{background:C.g100,borderRadius:"0 0 14px 14px",padding:"10px 10px 12px",marginBottom:9}}>
                    {myPosts.length===0
                      ? <div style={{textAlign:"center",padding:"28px 0",color:C.g400}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div style={{fontSize:13,fontWeight:600}}>아직 업로드한 게시물이 없어요</div></div>
                      : myPosts.map(makePostCard)}
                  </div>
                );
              })()}
            </div>

            {/* 개인정보 설정 */}
            <div>
              <div className="card" onClick={function(){
                if(!showSettings && currentUser){ setStName(currentUser.name||""); setStSchool(currentUser.school||""); setStAvatar(currentUser.avatar||"👩"); setStPic(currentUser.pic||null); }
                setShowSettings(function(v){return !v;});
              }} style={{background:C.white,borderRadius:14,padding:"14px",marginBottom:showSettings?0:9,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <span style={{fontSize:20}}>⚙️</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.navy}}>개인정보 설정</div>
                  <div style={{fontSize:12,color:C.g400}}>이름, 학교, 사진 수정</div>
                </div>
                <span style={{color:C.g400,fontSize:16,transform:showSettings?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>
              </div>
              {showSettings && userType==="student" && (
                <div style={{background:C.g100,borderRadius:"0 0 16px 16px",padding:"16px 14px 18px",marginBottom:9}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                    <div style={{position:"relative",flexShrink:0}}>
                      <div style={{width:58,height:58,borderRadius:17,background:C.primary+"22",border:"2px solid "+C.primary+"44",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>
                        {stPic ? <img src={stPic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/> : stAvatar}
                      </div>
                      <input ref={settingsPicRef} type="file" accept="image/*" style={{display:"none"}} onChange={function(e){ pickSingle(e, function(url){ setStPic(url); }); }}/>
                      <button className="btn" onClick={function(){settingsPicRef.current.click();}} style={{position:"absolute",bottom:-4,right:-4,width:22,height:22,borderRadius:7,background:C.primary,border:"2.5px solid white",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:C.g400,marginBottom:5}}>아이콘</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {AVATARS.map(function(a) {
                          return (
                            <button key={a} className="btn" onClick={function(){setStAvatar(a);setStPic(null);}} style={{width:28,height:28,borderRadius:8,border:"2px solid "+(stAvatar===a&&!stPic?C.primary:C.g200),background:stAvatar===a&&!stPic?C.soft:C.white,fontSize:15}}>
                              {a}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                  <input value={stName} onChange={function(e){setStName(e.target.value);}} placeholder="이름" style={{width:"100%",border:"1.5px solid "+(stName?C.primary:C.g200),borderRadius:12,padding:"10px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.white}}/>
                  <input value={stSchool} onChange={function(e){setStSchool(e.target.value);}} placeholder="학교 및 학년" style={{width:"100%",border:"1.5px solid "+C.g200,borderRadius:12,padding:"10px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:12,background:C.white}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn" onClick={saveSettings} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:C.primary,color:"#fff",fontWeight:700,fontSize:14}}>저장하기</button>
                    <button className="btn" onClick={function(){setShowSettings(false);}} style={{flex:1,padding:"11px",borderRadius:12,border:"1px solid "+C.g200,background:C.white,color:C.g600,fontWeight:700,fontSize:14}}>취소</button>
                  </div>
                </div>
              )}
            </div>

            <button className="btn" onClick={function(){setCurrentUser(null);LS.set("dc_me",null);setScreen("login");setLoginTab("new");setFormName("");setFormSchool("");setFormPic(null);setFormPin("");}} style={{width:"100%",padding:"13px",borderRadius:14,border:"1px solid "+C.g200,background:C.white,color:C.g600,fontSize:14,fontWeight:600,marginTop:4}}>로그아웃</button>
          </div>
        </div>
      )}

      {/* 하단 네비 */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:520,background:"rgba(250,250,248,0.96)",backdropFilter:"blur(14px)",borderTop:"1px solid "+C.g200,display:"flex",padding:"7px 0 20px",zIndex:100}}>
        {tabs.map(function(tab) {
          return (
            <button key={tab.id} className="btn" onClick={function(){setActiveTab(tab.id);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",padding:"5px 0"}}>
              <span style={{fontSize:tab.id==="upload"?24:20,filter:activeTab===tab.id?"none":"grayscale(1) opacity(0.42)",transition:"all .18s"}}>{tab.icon}</span>
              <span style={{fontSize:10,fontWeight:activeTab===tab.id?700:400,color:activeTab===tab.id?C.primary:C.g400}}>{tab.label}</span>
            </button>
          );
        })}
      </div>

      {/* 모달들 */}
      {commentModal && <CommentModal post={commentModal} currentUser={currentUser} onClose={function(){setCommentModal(null);}} onSubmit={handleCommentSubmit}/>}
      {loveModal && <LoveModal post={loveModal} onClose={function(){setLoveModal(null);}} onSend={function(p){
        setLoved(function(v){return Object.assign({},v,{[p.id]:true});});
        setLoveModal(null);
        showToast("💌 "+p.name+" 학생에게 러브콜을 보냈어요!");
        var callData = {from: currentUser ? currentUser.name : "기업담당자", tag: p.tag, postId: p.id, time: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})};
        FB.set("lovecalls/"+p.userId+"/lc"+Date.now(), callData);
      }}/>}
      {manageModal && <ManageModal post={manageModal} onClose={function(){setManageModal(null);}} onEdit={function(p){setEditModal(p);setManageModal(null);}} onDelete={handleDelete}/>}
      {editModal && <EditModal post={editModal} onClose={function(){setEditModal(null);}} onSave={handleEditSave}/>}
      {pinModal && <PinModal user={pinModal.user} input={pinInput} error={pinError} onInput={function(v){setPinInput(v);setPinError(false);}} onVerify={verifyPin} onClose={function(){setPinModal(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));

</script>
</body>
</html>
