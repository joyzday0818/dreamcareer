  async get(path) {
    try {
      const res = await fetch(`${FIREBASE_URL}/${path}.json`);

    } catch (e) {
      console.warn("FB get 실패:", path, e);
      return null;
    }
  },
  async set(path, data) {
    try {
      await fetch(`${FIREBASE_URL}/${path}.json`, {

        body: JSON.stringify(data)

      console.warn("FB set 실패:", path, e);

          type: file.type
        });
        return;
      }
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width,
          h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) {
            h = Math.round(h * MAX / w);
            w = MAX;
          } else {
            w = Math.round(w * MAX / h);
            h = MAX;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        res({
          url: canvas.toDataURL("image/jpeg", 0.92),
          type: "image/jpeg"
        });
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function App() {
  const [screen, setScreen] = useState("splash");
  const [loginTab, setLoginTab] = useState("new");
  const [userType, setUserType] = useState(null);
  const [currentUser, setCurrentUser] = useState(() => LS.get("dc_current_user", null));

  const [detailTab, setDetailTab] = useState("gallery"); // "gallery" | "posts"

  const [editModal, setEditModal] = useState(null);
  // ✅ FIX 3: 라이트박스 상태
  const [lightbox, setLightbox] = useState(null); // {items:[], index:0}
  // 알림
  const [lovecalls, setLovecalls] = useState([]);
  const [notifications, setNotifications] = useState([]); // ✅ FIX 4: 응원/댓글 알림
  const [sentLovecalls, setSentLovecalls] = useState([]);
  const [companyFormVisible, setCompanyFormVisible] = useState(false);
  const [companyFormName, setCompanyFormName] = useState("");

  const [selfScore, setSelfScore] = useState(50);
  const [uploading, setUploading] = useState(false);
  const [activeTab, setActiveTab] = useState("feed");
  const [isRefreshing, setIsRefreshing] = useState(false);
  const [pullY, setPullY] = useState(0);
  const pullStartY = useRef(0);
  const isPulling = useRef(false);
  const feedRef = useRef(null);
  const [filterTag, setFilterTag] = useState("전체");
  const [searchQuery, setSearchQuery] = useState("");
  const [showPortfolio, setShowPortfolio] = useState(false);
  const [portfolioView, setPortfolioView] = useState("card"); // "card" | "grid"
  const [showSettings, setShowSettings] = useState(false);
  const [showAccountMenu, setShowAccountMenu] = useState(false);
  const [stName, setStName] = useState("");
  const [stSchool, setStSchool] = useState("");
  const [stAvatar, setStAvatar] = useState("👩");
  const [stPic, setStPic] = useState(null);
  const [toastMsg, setToastMsg] = useState(null);
  const [syncStatus, setSyncStatus] = useState("");
  const fileRef = useRef();
  const loginPicRef = useRef();
  const settingsPicRef = useRef();
  const toast = msg => {
    setToastMsg(null);
    requestAnimationFrame(() => {
      setToastMsg(msg);
      setTimeout(() => setToastMsg(null), 2700);
    });
  };

  /* ✅ FIX 1: 피드 컨테이너에 non-passive touchmove 등록 → 브라우저 기본 새로고침 완전 차단 */
  useEffect(() => {
    const el = feedRef.current;
    if (!el) return;
    const handleTouchMove = e => {
      if (isPulling.current) e.preventDefault();
    };
    el.addEventListener('touchmove', handleTouchMove, {
      passive: false
    });
    return () => el.removeEventListener('touchmove', handleTouchMove);
  }, []); // 마운트 한 번만 등록 (ref는 항상 같은 div를 가리킴)

  // 탭 전환 시 당김 상태 반드시 초기화 (스크롤 블로킹 방지)
  useEffect(() => {
    isPulling.current = false;
    setPullY(0);
  }, [activeTab]);

  /* ✅ FIX 2: 앱 마운트 시 초기 history state 설정 */
  useEffect(() => {
    window.history.replaceState({
      app: 'main'
    }, '');
  }, []);

  /* ✅ FIX 2: 브라우저/하드웨어 뒤로가기 처리 */
  useEffect(() => {
    const onPop = () => {
      if (detail) {
        setDetail(null);
        // 뒤로가기 후 다시 main state 유지
        window.history.replaceState({
          app: 'main'
        }, '');
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [detail]);

  /* ✅ FIX 2: 상세 화면 진입 시 history state push */
  const openDetail = useCallback(post => {
    window.history.pushState({
      app: 'detail',
      postId: post.id
    }, '');
    setDetailTab("gallery");
    setDetail(post);
  }, []);

  /* ✅ FIX 2: 돌아가기 버튼 */
  const closeDetail = useCallback(() => {
    if (window.history.state?.app === 'detail') {
      window.history.back(); // popstate 핸들러가 setDetail(null) 처리
    } else {
      setDetail(null);
    }
  }, []);

  /* ── 갤럭시/삼성 브라우저 실제 높이 주입 ── */
  useEffect(() => {
    const setH = () => {
      document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    };
    setH();
    window.addEventListener('resize', setH);
    window.addEventListener('orientationchange', () => {
      setTimeout(setH, 200);
    });
    return () => window.removeEventListener('resize', setH);
  }, []);

  /* ── 앱 초기화 ── */
  useEffect(() => {
    setTimeout(() => setScreen("login"), 2000);
  }, []);
  const loadFromFirebase = useCallback(async (showRefresh = false) => {
    if (showRefresh) setIsRefreshing(true);
    try {
      const data = await FB.get("posts");
      if (data) {
        const fbPosts = Object.values(data).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        const fbIds = fbPosts.map(p => p.id);
        setPosts([...fbPosts, ...DEMO_POSTS.filter(d => !fbIds.includes(d.id))]);
      }
    } catch (e) {
      console.warn("피드 로드 실패", e);
    }
    setPostsReady(true);
    if (showRefresh) {
      setTimeout(() => setIsRefreshing(false), 600);
    }
  }, []);
  useEffect(() => {
    loadFromFirebase();
    // ✅ 성능 개선: 45초 간격 + 탭 숨김 시 자동 정지
    let interval = null;
    const startInterval = () => {
      if (interval) return;
      interval = setInterval(() => {
        if (activeTab === 'feed' && document.visibilityState === 'visible') {
          loadFromFirebase();
        }
      }, 45000); // 10초→45초로 늘려 Firebase 트래픽 대폭 감소
    };
    const stopInterval = () => {
      clearInterval(interval);
      interval = null;
    };
    const onVisibility = () => document.hidden ? stopInterval() : startInterval();
    startInterval();
    document.addEventListener('visibilitychange', onVisibility);
    return () => {
      stopInterval();
      document.removeEventListener('visibilitychange', onVisibility);
    };
  }, [loadFromFirebase, activeTab]);
  useEffect(() => {
    LS.set("dc_liked", liked);
  }, [liked]);
  useEffect(() => {
    if (currentUser) LS.set("dc_current_user", currentUser);
  }, [currentUser]);

  // ✅ FIX 4: 알림 탭 진입 시 알림 로드 (러브콜 + 응원/댓글)
  useEffect(() => {
    if (activeTab !== 'notify' || !currentUser || userType !== 'student') return;
    FB.get(`lovecalls/${currentUser.id}`).then(data => {
      if (data) setLovecalls(Object.values(data).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
    });
    FB.get(`notifications/${currentUser.id}`).then(data => {
      if (data) setNotifications(Object.values(data).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)));
    });
  }, [activeTab, currentUser, userType]);
  useEffect(() => {
    if (!currentUser || userType !== 'company') return;
    FB.get(`companyLovecalls/${currentUser.id}`).then(data => {
      if (data) setSentLovecalls(Object.values(data).sort((a, b) => b.sentAt - a.sentAt));
    });
  }, [currentUser, userType]);

  // 관리자 체크 - 이름에 "전예원" 포함하면 관리자 (공백 무관)
  const isAdmin = !!(currentUser?.name?.trim().includes("전예원") && userType === "student");

  // 관리자 계정 목록 로드 (조건부 반환 이전에 선언해야 함)
  useEffect(() => {
    if (activeTab !== "profile" || adminSubTab !== "accounts" || !isAdmin) return;
    setAdminUsersLoading(true);
    FB.get("users").then(data => {
      setAdminUsers(data ? Object.values(data) : []);
      setAdminUsersLoading(false);
    }).catch(() => setAdminUsersLoading(false));
  }, [activeTab, adminSubTab, isAdmin]);

  /* ── 파일 처리 ── */
  const pickFiles = async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    const results = await Promise.all(files.map(f => compressFile(f)));
    setMediaList(prev => [...prev, ...results]);
    e.target.value = "";
  };
  const pickSingleFile = async (e, onDone) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = await compressFile(file);
    onDone(r.url);
    e.target.value = "";
  };

  /* ── 회원가입 ── */
  const handleRegister = async () => {
    if (!formName.trim()) {
      toast("✏️ 이름을 입력해주세요!");
      return;
    }
    const usersData = await FB.get("users");
    const users = usersData ? Object.values(usersData) : [];
    const exist = users.find(u => u.name === formName.trim() && u.school === (formSchool.trim() || ""));
    if (exist) {
      // 사진은 userPics에서 별도 로드
      const pic = await FB.get(`userPics/${exist.id}`);
      const userWithPic = {
        ...exist,
        pic: pic || null
      };
      setCurrentUser(userWithPic);
      setUserType("student");
      setScreen("main");
      toast(`👋 다시 만나요, ${exist.name}님!`);
      return;
    }
    // users/ 에는 사진 없이 경량 정보만 저장
    const newUser = {
      id: "u" + Date.now(),
      name: formName.trim(),
      school: formSchool.trim(),
      avatar: formAvatar
    };
    await FB.set(`users/${newUser.id}`, newUser);
    // 사진은 userPics/ 에 분리 저장
    if (formPic) await FB.set(`userPics/${newUser.id}`, formPic);
    const userWithPic = {
      ...newUser,
      pic: formPic
    };
    setCurrentUser(userWithPic);
    setUserType("student");
    setScreen("main");
    toast(`🎉 환영해요, ${newUser.name}님!`);
  };
  const handleExistingLogin = async () => {
    if (!formName.trim()) {
      toast("✏️ 이름을 입력해주세요!");
      return;
    }
    const usersData = await FB.get("users");
    const users = usersData ? Object.values(usersData) : [];
    const found = users.find(u => u.name === formName.trim() && u.school === (formSchool.trim() || ""));
    if (!found) {
      toast("❌ 일치하는 계정이 없어요. 새로 가입해주세요!");
      return;
    }
    const pic = await FB.get(`userPics/${found.id}`);
    setCurrentUser({
      ...found,
      pic: pic || null
    });
    setUserType("student");
    setScreen("main");
    toast(`👋 반가워요, ${found.name}님!`);
  };

  /* ── 게시물 업로드 ── */
  const handleUpload = async () => {
    if (!desc.trim() && mediaList.length === 0) {
      toast("📝 사진이나 내용을 추가해주세요!");
      return;
    }
    setUploading(true);
    setSyncStatus("saving");
    try {
      const id = "p" + Date.now();
      const newPost = {
        id,
        userId: currentUser?.id || "anon",
        name: currentUser?.name || "나",
        school: currentUser?.school || "",
        avatar: currentUser?.avatar || "👩",
        profilePic: currentUser?.pic || null,
        tag,
        desc,
        likes: 0,
        commentList: [],
        time: "방금 전",
        mediaList: [...mediaList],
        progress: selfScore,
        selfPraise: selfPraise.trim(),
        createdAt: Date.now()
      };
      await FB.set(`posts/${id}`, newPost);
      setPosts(p => [newPost, ...p]);
      setMediaList([]);
      setDesc("");
      setSelfScore(50);
      setSelfPraise("");
      setSyncStatus("saved");
      toast("🎉 업로드 완료! 모든 기기에서 볼 수 있어요!");
      setActiveTab("feed");
    } catch (e) {
      setSyncStatus("error");

      if (post.userId && post.userId !== currentUser?.id && currentUser && post.userId !== 'demo') {
        const notifId = "n" + Date.now();

          id: notifId,

          })
        };
        FB.set(`notifications/${post.userId}/${notifId}`, notif);
      }
    }
  };

  /* ── 설정 저장 ── */

      return {
