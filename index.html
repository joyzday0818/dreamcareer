const FB = {
  async get(path) {
    try {
      const res = await fetch(`${FIREBASE_URL}/${path}.json`);
      return res.ok ? await res.json() : null;
    } catch(e) { console.warn("FB get 실패:", path, e); return null; }
  },
  async set(path, data) {
    try {
      await fetch(`${FIREBASE_URL}/${path}.json`, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data),
      });
    } catch(e) { console.warn("FB set 실패:", path, e); }
  },
  async update(path, data) {
    try {
      await fetch(`${FIREBASE_URL}/${path}.json`, {
        method:"PATCH", headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data),
      });
    } catch(e) { console.warn("FB update 실패:", path, e); }
  },
  async remove(path) {
    try {
      await fetch(`${FIREBASE_URL}/${path}.json`, { method:"DELETE" });
    } catch(e) { console.warn("FB remove 실패:", path, e); }
  },
};

function compressFile(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => {
      if (file.type.startsWith("video/")) { res({url:e.target.result,type:file.type}); return; }
      const img = new Image();
      img.onload = () => {
        const MAX=1600; let w=img.width,h=img.height;
        if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
        const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        res({url:canvas.toDataURL("image/jpeg",0.92),type:"image/jpeg"});
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function timeAgo(createdAt) {
  if(!createdAt) return "방금 전";
  const diff = Date.now() - createdAt;
  const m = Math.floor(diff/60000);
  if(m < 1)  return "방금 전";
  if(m < 60) return `${m}분 전`;
  const h = Math.floor(m/60);
  if(h < 24) return `${h}시간 전`;
  const d = Math.floor(h/24);
  if(d === 1) return "어제";
  if(d < 7)  return `${d}일 전`;
  const w = Math.floor(d/7);
  if(w < 5)  return `${w}주 전`;
  return `${Math.floor(d/30)}달 전`;
}

/* ✅ FIX 3: MediaView - onImageClick 추가 */
function MediaView({mediaList, emoji, color, height=220, onImageClick}) {
  const items = mediaList || [];
  if (!items.length) return (
    <div style={{width:"100%",height,background:`linear-gradient(135deg,${color}18,${color}06)`,display:"flex",alignItems:"center",justifyContent:"center"}}>

  );
  if (items.length === 1) {
    const it = items[0];
    return it.type?.startsWith("video")
      ? <video src={it.url} controls playsInline style={{width:"100%",height,objectFit:"cover",display:"block",background:"#000"}}/>
      : <img src={it.url} onClick={e=>{e.stopPropagation();onImageClick&&onImageClick(0);}} style={{width:"100%",height,objectFit:"cover",display:"block",cursor:onImageClick?"zoom-in":"default"}} alt=""/>;
  }
  return (
    <div style={{overflowX:"auto",display:"flex",gap:6,scrollSnapType:"x mandatory"}}>
      {items.map((it,i)=>(
        <div key={i} style={{flexShrink:0,width:"82vw",maxWidth:400,scrollSnapAlign:"start",position:"relative",borderRadius:i===0?"0":"12px",overflow:"hidden"}}>

        </div>
      ))}
    </div>
  );
}

/* ✅ FIX 3: 라이트박스 컴포넌트 */
function Lightbox({items, initialIndex, onClose}) {
  const [idx, setIdx] = useState(initialIndex || 0);
  const touchStartX = useRef(0);
  const touchStartY = useRef(0);

  useEffect(() => {
    const handleKey = e => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft') setIdx(i => Math.max(0, i-1));
      if (e.key === 'ArrowRight') setIdx(i => Math.min(items.length-1, i+1));
    };
    document.addEventListener('keydown', handleKey);
    return () => document.removeEventListener('keydown', handleKey);
  }, [items.length, onClose]);

  if (!items || items.length === 0) return null;
  const item = items[idx];

  return (
    <div
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.97)",zIndex:600,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}
      onTouchStart={e=>{touchStartX.current=e.touches[0].clientX;touchStartY.current=e.touches[0].clientY;}}
      onTouchEnd={e=>{
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        const dy = Math.abs(e.changedTouches[0].clientY - touchStartY.current);
        if (dy < 60 && Math.abs(dx) > 50) {
          if (dx > 0 && idx > 0) setIdx(i=>i-1);
          if (dx < 0 && idx < items.length-1) setIdx(i=>i+1);
        }
      }}
      onClick={onClose}
    >
      {/* 상단 헤더 */}
      <div style={{position:"absolute",top:0,left:0,right:0,padding:"16px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(rgba(0,0,0,0.6),transparent)",zIndex:10}}>
        {items.length > 1
          ? <span style={{color:"rgba(255,255,255,0.9)",fontSize:13,fontWeight:700,background:"rgba(0,0,0,0.4)",borderRadius:10,padding:"4px 12px"}}>{idx+1} / {items.length}</span>
          : <span/>
        }
        <button className="btn" onClick={onClose} style={{width:38,height:38,borderRadius:12,background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
      </div>

      {/* 이미지/비디오 */}
      <div style={{width:"100%",maxHeight:"calc(100vh - 140px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"60px 12px 20px",animation:"lightboxIn 0.2s ease"}} onClick={e=>e.stopPropagation()}>
        {item.type?.startsWith("video")
          ? <video src={item.url} controls playsInline style={{maxWidth:"100%",maxHeight:"100%",borderRadius:14}}/>
          : <img src={item.url} style={{maxWidth:"100%",maxHeight:"calc(100vh - 140px)",objectFit:"contain",borderRadius:8,boxShadow:"0 20px 60px rgba(0,0,0,0.5)"}} alt={`사진 ${idx+1}`}/>
        }
      </div>

      {/* 이전/다음 화살표 */}
      {items.length > 1 && idx > 0 && (
        <button className="btn" onClick={e=>{e.stopPropagation();setIdx(i=>i-1);}} style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",width:46,height:46,borderRadius:15,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      )}
      {items.length > 1 && idx < items.length-1 && (
        <button className="btn" onClick={e=>{e.stopPropagation();setIdx(i=>i+1);}} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",width:46,height:46,borderRadius:15,background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",color:"#fff",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      )}

      {/* 하단 점 인디케이터 */}
      {items.length > 1 && (
        <div style={{position:"absolute",bottom:28,left:0,right:0,display:"flex",justifyContent:"center",gap:6}}>
          {items.map((_,i)=>(
            <button key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:i===idx?20:6,height:6,borderRadius:3,background:i===idx?"#fff":"rgba(255,255,255,0.35)",border:"none",cursor:"pointer",transition:"all .22s",padding:0}}/>
          ))}
        </div>
      )}
    </div>
  );
}

  // 알림

  const [notifications,setNotifications] = useState([]); // ✅ FIX 4: 응원/댓글 알림
  const [sentLovecalls,setSentLovecalls] = useState([]);
  const [companyFormVisible,setCompanyFormVisible] = useState(false);
  const [companyFormName,setCompanyFormName]       = useState("");
  const [mediaList,setMediaList]     = useState([]);
  const [desc,setDesc]               = useState("");
  const [selfPraise,setSelfPraise]   = useState("");
  const [tag,setTag]                 = useState("#바리스타");
  const [selfScore,setSelfScore]     = useState(50);
  const [uploading,setUploading]     = useState(false);
  const [activeTab,setActiveTab]     = useState("feed");
  const [isRefreshing,setIsRefreshing] = useState(false);
  const [pullY,setPullY]             = useState(0);
  const pullStartY                   = useRef(0);
  const isPulling                    = useRef(false);
  const feedRef                      = useRef(null);
  const [filterTag,setFilterTag]     = useState("전체");
  const [searchQuery,setSearchQuery] = useState("");
  const [showPortfolio,setShowPortfolio] = useState(false);
  const [portfolioView,setPortfolioView] = useState("card"); // "card" | "grid"
  const [showSettings,setShowSettings]   = useState(false);
  const [stName,setStName]     = useState("");
  const [stSchool,setStSchool] = useState("");
  const [stAvatar,setStAvatar] = useState("👩");
  const [stPic,setStPic]       = useState(null);
  const [toastMsg,setToastMsg] = useState(null);
  const [syncStatus,setSyncStatus] = useState("");
  const fileRef        = useRef();
  const loginPicRef    = useRef();
  const settingsPicRef = useRef();

  const toast = msg => { setToastMsg(null); requestAnimationFrame(()=>{ setToastMsg(msg); setTimeout(()=>setToastMsg(null),2700); }); };

  /* ✅ FIX 1: 피드 컨테이너에 non-passive touchmove 등록 → 브라우저 기본 새로고침 완전 차단 */
  useEffect(()=>{
    const el = feedRef.current;
    if (!el) return;
    const handleTouchMove = (e) => {
      if (isPulling.current) e.preventDefault();
    };
    el.addEventListener('touchmove', handleTouchMove, {passive: false});
    return () => el.removeEventListener('touchmove', handleTouchMove);
  }, []); // 마운트 한 번만 등록 (ref는 항상 같은 div를 가리킴)

  // 탭 전환 시 당김 상태 반드시 초기화 (스크롤 블로킹 방지)
  useEffect(()=>{
    isPulling.current = false;
    setPullY(0);
  }, [activeTab]);

  /* ✅ FIX 2: 앱 마운트 시 초기 history state 설정 */
  useEffect(()=>{
    window.history.replaceState({app:'main'}, '');
  }, []);

  /* ✅ FIX 2: 브라우저/하드웨어 뒤로가기 처리 */
  useEffect(()=>{
    const onPop = () => {
      if (detail) {
        setDetail(null);
        // 뒤로가기 후 다시 main state 유지
        window.history.replaceState({app:'main'}, '');
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, [detail]);

  /* ✅ FIX 2: 상세 화면 진입 시 history state push */
  const openDetail = useCallback((post) => {
    window.history.pushState({app:'detail', postId:post.id}, '');
    setDetailTab("gallery");
    setDetail(post);
  }, []);

  /* ✅ FIX 2: 돌아가기 버튼 */
  const closeDetail = useCallback(() => {
    if (window.history.state?.app === 'detail') {
      window.history.back(); // popstate 핸들러가 setDetail(null) 처리
    } else {
      setDetail(null);
    }
  }, []);

  /* ── 앱 초기화 ── */
  useEffect(()=>{ setTimeout(()=>setScreen("login"),2000); },[]);

  const loadFromFirebase = useCallback(async (showRefresh=false) => {
    if (showRefresh) setIsRefreshing(true);
    const data = await FB.get("posts");
    if (data) {
      const fbPosts = Object.values(data).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
      const fbIds = fbPosts.map(p=>p.id);
      setPosts([...fbPosts, ...DEMO_POSTS.filter(d=>!fbIds.includes(d.id))]);
    }
    setPostsReady(true);
    if (showRefresh) { setTimeout(()=>setIsRefreshing(false), 600); }
  }, []);

  useEffect(()=>{
    loadFromFirebase();
    const interval = setInterval(()=>{
      // ✅ FIX 1: 피드 탭일 때만 자동 새로고침
      if (activeTab === 'feed') loadFromFirebase();
    }, 10000);
    return ()=>clearInterval(interval);
  }, [loadFromFirebase, activeTab]);

  useEffect(()=>{ LS.set("dc_liked",liked); },[liked]);
  useEffect(()=>{ if(currentUser) LS.set("dc_current_user",currentUser); },[currentUser]);

  // ✅ FIX 4: 알림 탭 진입 시 알림 로드 (러브콜 + 응원/댓글)
  useEffect(()=>{
    if (activeTab !== 'notify' || !currentUser || userType !== 'student') return;
    FB.get(`lovecalls/${currentUser.id}`).then(data=>{
      if (data) setLovecalls(Object.values(data).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
    });
    FB.get(`notifications/${currentUser.id}`).then(data=>{
      if (data) setNotifications(Object.values(data).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
    });
  }, [activeTab, currentUser, userType]);

  useEffect(()=>{
    if (!currentUser || userType !== 'company') return;
    FB.get(`companyLovecalls/${currentUser.id}`).then(data=>{
      if (data) setSentLovecalls(Object.values(data).sort((a,b)=>b.sentAt-a.sentAt));
    });
  }, [currentUser, userType]);

  // 관리자 체크 (hooks 이전에 선언 필요)
  const isAdmin = ["전예원"].includes(currentUser?.name) && userType==="student";

  // 관리자 계정 목록 로드 (조건부 반환 이전에 선언해야 함)
  useEffect(()=>{
    if(activeTab!=="profile"||adminSubTab!=="accounts"||!isAdmin) return;
    setAdminUsersLoading(true);
    FB.get("users").then(data=>{
      setAdminUsers(data?Object.values(data):[]);
      setAdminUsersLoading(false);
    }).catch(()=>setAdminUsersLoading(false));
  },[activeTab,adminSubTab,isAdmin]);

  /* ── 파일 처리 ── */
  const pickFiles = async e => {
    const files=Array.from(e.target.files); if(!files.length) return;
    const results=await Promise.all(files.map(f=>compressFile(f)));
    setMediaList(prev=>[...prev,...results]);
    e.target.value="";
  };
  const pickSingleFile = async (e,onDone) => {
    const file=e.target.files[0]; if(!file) return;
    const r=await compressFile(file); onDone(r.url); e.target.value="";
  };

  /* ── 회원가입 ── */
  const handleRegister = async () => {
    if(!formName.trim()) { toast("✏️ 이름을 입력해주세요!"); return; }
    const usersData = await FB.get("users");
    const users = usersData ? Object.values(usersData) : [];
    const exist = users.find(u=>u.name===formName.trim()&&u.school===(formSchool.trim()||""));
    if(exist) {
      setCurrentUser(exist); setUserType("student"); setScreen("main");
      toast(`👋 다시 만나요, ${exist.name}님!`); return;
    }
    const newUser={id:"u"+Date.now(),name:formName.trim(),school:formSchool.trim(),avatar:formAvatar,pic:formPic};
    await FB.set(`users/${newUser.id}`, newUser);
    setCurrentUser(newUser); setUserType("student"); setScreen("main");
    saveToLocalAccounts(newUser);
    toast(`🎉 환영해요, ${newUser.name}님!`);
  };

  const handleExistingLogin = async () => {
    if(!formName.trim()) { toast("✏️ 이름을 입력해주세요!"); return; }
    const usersData = await FB.get("users");
    const users = usersData ? Object.values(usersData) : [];
    const found = users.find(u=>u.name===formName.trim()&&u.school===(formSchool.trim()||""));
    if(!found) { toast("❌ 일치하는 계정이 없어요. 새로 가입해주세요!"); return; }
    setCurrentUser(found); setUserType("student"); setScreen("main");
    saveToLocalAccounts(found);
    toast(`👋 반가워요, ${found.name}님!`);
  };

  /* ── 게시물 업로드 ── */
  const handleUpload = async () => {
    if(!desc.trim()&&mediaList.length===0) { toast("📝 사진이나 내용을 추가해주세요!"); return; }
    setUploading(true); setSyncStatus("saving");
    try {
      const id = "p"+Date.now();
      const newPost = {
        id, userId:currentUser?.id||"anon",
        name:currentUser?.name||"나", school:currentUser?.school||"",
        avatar:currentUser?.avatar||"👩", profilePic:currentUser?.pic||null,
        tag, desc, likes:0, commentList:[], time:"방금 전",
        mediaList:[...mediaList], progress:selfScore, selfPraise:selfPraise.trim(),
        createdAt:Date.now(),
      };
      await FB.set(`posts/${id}`, newPost);
      setPosts(p=>[newPost,...p]);
      setMediaList([]); setDesc(""); setSelfScore(50); setSelfPraise("");
      setSyncStatus("saved");
      toast("🎉 업로드 완료! 모든 기기에서 볼 수 있어요!");
      setActiveTab("feed");
    } catch(e) {
      setSyncStatus("error");
      toast("⚠️ 업로드 실패. 인터넷 연결을 확인해주세요.");
    } finally {
      setUploading(false);
      setTimeout(()=>setSyncStatus(""),3000);
    }
  };

  /* ✅ FIX 4: 응원(좋아요) - 알림 저장 추가 */
  const handleLike = async post => {
    const isLiked = !!liked[post.id];
    setLiked(p=>({...p,[post.id]:!isLiked}));
    const newLikes = (post.likes||0) + (isLiked?-1:1);
    setPosts(prev=>prev.map(p=>p.id===post.id?{...p,likes:newLikes}:p));
    if(detail?.id===post.id) setDetail(d=>({...d,likes:newLikes}));
    await FB.update(`posts/${post.id}`, {likes:newLikes});
    if (!isLiked) {
      toast("💛 응원을 보냈어요!");
      // ✅ FIX 4: 내 게시물이 아닐 때만 알림 저장
      if (post.userId && post.userId !== currentUser?.id && currentUser && post.userId !== 'demo') {
        const notifId = "n" + Date.now();
        const notif = {
          id: notifId, type: 'like',
          from: currentUser.name,
          fromAvatar: currentUser.avatar || "👤",
          postId: post.id,
          postDesc: (post.desc||"").substring(0,40),
          tag: post.tag,
          createdAt: Date.now(),
          time: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}),
        };
        FB.set(`notifications/${post.userId}/${notifId}`, notif);
      }
    }
  };

  /* ── 설정 저장 ── */
  const saveSettings = async () => {
    const updated={...currentUser,name:stName,school:stSchool,avatar:stAvatar,pic:stPic};
    await FB.set(`users/${updated.id}`, updated);
    setCurrentUser(updated);
    saveToLocalAccounts(updated);
    setPosts(p=>p.map(post=>post.userId===updated.id?{...post,name:updated.name,school:updated.school,avatar:updated.avatar,profilePic:updated.pic}:post));
    const myPosts = posts.filter(p=>p.userId===updated.id);
    await Promise.all(myPosts.map(p=>FB.update(`posts/${p.id}`,{name:updated.name,school:updated.school,avatar:updated.avatar,profilePic:updated.pic})));
    setShowSettings(false);
    toast("✅ 프로필이 저장됐어요!");
  };

  /* ── 게시물 삭제 ── */
  const handleDelete = async post => {
    setPosts(prev=>prev.filter(p=>p.id!==post.id));
    setManageModal(null);
    if(detail?.id===post.id) setDetail(null);
    await FB.remove(`posts/${post.id}`);
    toast("🗑️ 게시물이 삭제됐어요.");
  };

  /* ── 게시물 수정 ── */
  const handleEditSave = async (postId,newDesc,newTag,newProgress) => {
    const updated={...posts.find(p=>p.id===postId),desc:newDesc,tag:newTag,progress:newProgress};
    setPosts(prev=>prev.map(p=>p.id===postId?updated:p));
    if(detail?.id===postId) setDetail(updated);
    setEditModal(null);
    await FB.update(`posts/${postId}`,{desc:newDesc,tag:newTag,progress:newProgress});
    toast("✅ 게시물이 수정됐어요!");
  };

  // 댓글 하트 상태 (localStorage)
  const [commentLiked, setCommentLiked] = useState(()=>LS.get("dc_comment_liked",{}));
  useEffect(()=>{ LS.set("dc_comment_liked",commentLiked); },[commentLiked]);

  /* ── 댓글 하트 ── */
  const handleCommentLike = async (post, commentIdx) => {
    const key = `${post.id}_${commentIdx}`;
    const isLiked = !!commentLiked[key];
    setCommentLiked(prev=>({...prev,[key]:!isLiked}));
    const newCommentList = (post.commentList||[]).map((c,i)=>{
      if(i!==commentIdx) return c;
      const newLikes = (c.likes||0) + (isLiked?-1:1);
      return {...c, likes: newLikes};
    });
    setPosts(prev=>prev.map(p=>p.id===post.id?{...p,commentList:newCommentList}:p));
    setCommentModal(prev=>prev&&prev.id===post.id?{...prev,commentList:newCommentList}:prev);
    if(detail?.id===post.id) setDetail(d=>({...d,commentList:newCommentList}));
    await FB.update(`posts/${post.id}`, {commentList:newCommentList});
    // 하트 눌렀을 때만 알림 (내 댓글 아닐 때)
    if(!isLiked && currentUser) {
      const comment = (post.commentList||[])[commentIdx];
      // comment.userId 없으면 post 작성자에게 폴백 (구 댓글 호환)
      const commentAuthorId = comment?.userId || post.userId;
      if(commentAuthorId && commentAuthorId !== currentUser.id && commentAuthorId !== 'demo') {
        const notifId = "n" + Date.now();
        const notif = {
          id: notifId, type: 'commentLike',
          from: currentUser.name,
          fromAvatar: currentUser.avatar || "👤",
          fromRole: currentUser.role === 'company' ? 'company' : 'student',
          postId: post.id,
          commentText: (comment?.text||"").substring(0,40),
          tag: post.tag,
          createdAt: Date.now(),
          time: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}),
        };
        FB.set(`notifications/${commentAuthorId}/${notifId}`, notif);
      }
    }
  };

  /* ✅ FIX 4: 댓글 제출 - 알림 저장 추가 */
  const handleCommentSubmit = async (postId, comment) => {
    const post = posts.find(p=>p.id===postId);
    if(!post) return;
    const newCommentList = [...(post.commentList||[]), comment];
    setPosts(prev=>prev.map(p=>p.id===postId?{...p,commentList:newCommentList}:p));
    setCommentModal(prev=>prev&&prev.id===postId?{...prev,commentList:newCommentList}:prev);
    if(detail?.id===postId) setDetail(d=>({...d,commentList:newCommentList}));
    await FB.update(`posts/${postId}`, {commentList:newCommentList});
    // ✅ FIX 4: 내 게시물이 아닐 때만 댓글 알림 저장
    if (post.userId && post.userId !== currentUser?.id && currentUser && post.userId !== 'demo') {
      const notifId = "n" + Date.now();
      const notif = {
        id: notifId, type: 'comment',
        from: currentUser.name,
        fromAvatar: currentUser.avatar || "👤",
        postId: post.id,
        postDesc: (post.desc||"").substring(0,40),
        commentText: comment.text.substring(0,40),
        tag: post.tag,
        createdAt: Date.now(),
        time: new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}),
      };
      FB.set(`notifications/${post.userId}/${notifId}`, notif);
    }
  };

  /* ── 이 기기에 저장된 계정 (localStorage) ── */
  const [savedUsers,setSavedUsers] = useState(()=>LS.get("dc_local_accounts",[]));

  // 로그인 성공 시 이 기기 계정 목록에 추가/갱신
  const saveToLocalAccounts = (user) => {
    setSavedUsers(prev => {
      const filtered = prev.filter(u => u.id !== user.id);
      const updated = [user, ...filtered]; // 최근 로그인 순
      LS.set("dc_local_accounts", updated);
      return updated;
    });
  };

  /* ══ SPLASH ══ */
  if(screen==="splash") return (
    <div style={{width:"100%",height:"100vh",background:`linear-gradient(145deg,${C.primary},${C.gold})`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:76,animation:"pulse 2s ease-in-out infinite",marginBottom:22}}>✨</div>
      <div style={{color:"#fff",fontSize:38,fontWeight:900,letterSpacing:-1.5,animation:"fadeUp 0.7s ease forwards"}}>드림 커리어</div>
      <div style={{color:"rgba(255,255,255,0.82)",fontSize:15,marginTop:8,animation:"fadeUp 0.7s 0.28s ease forwards",opacity:0}}>내 꿈에 한 발짝 더 가까이</div>
      <div style={{marginTop:60,width:48,height:4,background:"rgba(255,255,255,0.3)",borderRadius:2,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",top:0,height:"100%",width:"55%",background:"#fff",borderRadius:2,animation:"shimmer 1.4s linear infinite"}}/>
      </div>
      <div style={{marginTop:20,fontSize:11,color:"rgba(255,255,255,0.6)"}}>🟢 서버 연결됨</div>
    </div>
  );

  /* ══ LOGIN ══ */
  if(screen==="login") return (
    <div style={{position:"fixed",inset:0,background:C.surface,overflowY:"auto",overscrollBehavior:"contain",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"40px 20px 60px",WebkitOverflowScrolling:"touch"}}>
      <Toast msg={toastMsg}/>
      <div style={{animation:"fadeUp 0.5s ease forwards",textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:8}}>✨</div>
        <div style={{fontSize:27,fontWeight:900,color:C.navy,letterSpacing:-1}}>드림 커리어</div>
        <div style={{fontSize:13,color:C.g400,marginTop:4}}>장애학생의 빛나는 순간을 세상에</div>
      </div>
      <div style={{width:"100%",maxWidth:400,animation:"fadeUp 0.5s 0.15s ease forwards",opacity:0}}>
        <div style={{background:C.white,borderRadius:24,padding:"20px 18px",marginBottom:12,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{fontSize:20}}>🎓</span>
            <span style={{fontSize:15,fontWeight:700,color:C.navy}}>학생 계정</span>
          </div>
          <div style={{display:"flex",background:C.g100,borderRadius:14,padding:4,marginBottom:16,gap:4}}>
            {[["new","새로 시작하기"],["existing","기존 계정 로그인"]].map(([val,lbl])=>(
              <button key={val} className="btn" onClick={()=>setLoginTab(val)} style={{flex:1,padding:"9px 4px",borderRadius:11,border:"none",background:loginTab===val?C.white:"transparent",color:loginTab===val?C.navy:C.g400,fontWeight:loginTab===val?700:400,fontSize:12,boxShadow:loginTab===val?"0 2px 8px rgba(0,0,0,0.08)":"none"}}>{lbl}</button>
            ))}
          </div>
          {loginTab==="existing" ? (
            <>
              {savedUsers.length>0 ? (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:C.g400,marginBottom:8,fontWeight:600}}>📱 이 기기에 저장된 계정</div>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    {savedUsers.map(u=>(
                      <button key={u.id} className="btn" onClick={()=>{setCurrentUser(u);setUserType("student");setScreen("main");saveToLocalAccounts(u);toast(`👋 반가워요, ${u.name}님!`);}}
                        style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:14,border:`1.5px solid ${C.g200}`,background:C.g100,textAlign:"left"}}>
                        <div style={{width:38,height:38,borderRadius:12,background:`${C.primary}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,overflow:"hidden",flexShrink:0}}>
                          {u.pic?<img src={u.pic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:u.avatar}
                        </div>
                        <div>
                          <div style={{fontSize:14,fontWeight:700,color:C.navy}}>{u.name}</div>
                          <div style={{fontSize:11,color:C.g400}}>{u.school||"학교 미입력"}</div>
                        </div>
                      </button>
                    ))}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,margin:"12px 0 10px"}}><div style={{flex:1,height:1,background:C.g200}}/><span style={{fontSize:11,color:C.g400}}>또는 직접 입력</span><div style={{flex:1,height:1,background:C.g200}}/></div>
                </div>
              ) : (
                <div style={{textAlign:"center",padding:"18px 0 10px",color:C.g400,fontSize:12}}>이 기기에 저장된 계정이 없어요</div>
              )}
              <input placeholder="✏️ 이름" value={formName} onChange={e=>setFormName(e.target.value)} style={{width:"100%",border:`1.5px solid ${formName?C.primary:C.g200}`,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100}}/>
              <input placeholder="🏫 학교 및 학년" value={formSchool} onChange={e=>setFormSchool(e.target.value)} style={{width:"100%",border:`1.5px solid ${C.g200}`,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:14,background:C.g100}}/>
              <button className="btn" onClick={handleExistingLogin} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:`linear-gradient(135deg,${C.primary},${C.gold})`,color:"#fff",fontSize:14,fontWeight:900,boxShadow:"0 5px 18px rgba(255,107,53,0.32)"}}>로그인 →</button>
            </>
          ) : (
            <>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                <div style={{position:"relative",flexShrink:0}}>
                  <div style={{width:62,height:62,borderRadius:19,background:`${C.primary}22`,border:`2px solid ${C.primary}44`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:34}}>
                    {formPic?<img src={formPic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:formAvatar}
                  </div>
                  <input ref={loginPicRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pickSingleFile(e,url=>setFormPic(url))}/>
                  <button className="btn" onClick={()=>loginPicRef.current.click()} style={{position:"absolute",bottom:-4,right:-4,width:23,height:23,borderRadius:8,background:C.primary,border:"2.5px solid white",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:C.g400,marginBottom:6}}>아이콘 선택 (또는 📷 사진)</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {AVATARS.map(a=>(
                      <button key={a} className="btn" onClick={()=>{setFormAvatar(a);setFormPic(null);}} style={{width:32,height:32,borderRadius:9,border:`2px solid ${formAvatar===a&&!formPic?C.primary:C.g200}`,background:formAvatar===a&&!formPic?C.soft:C.white,fontSize:17}}>{a}</button>
                    ))}
                  </div>
                </div>
              </div>
              <input placeholder="✏️ 이름  예) 전예원" value={formName} onChange={e=>setFormName(e.target.value)} style={{width:"100%",border:`1.5px solid ${formName?C.primary:C.g200}`,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.g100,transition:"border-color .2s"}}/>
              <input placeholder="🏫 학교 및 학년  예) 홀트학교 전공과 1학년" value={formSchool} onChange={e=>setFormSchool(e.target.value)} style={{width:"100%",border:`1.5px solid ${C.g200}`,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:14,background:C.g100}}/>
              <button className="btn" onClick={handleRegister} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:`linear-gradient(135deg,${C.primary},${C.gold})`,color:"#fff",fontSize:14,fontWeight:900,boxShadow:"0 5px 18px rgba(255,107,53,0.32)"}}>포트폴리오 시작하기 →</button>
            </>
          )}
        </div>
        {!companyFormVisible?(
          <button className="btn" onClick={()=>setCompanyFormVisible(true)} style={{width:"100%",background:C.white,borderRadius:18,padding:"15px 18px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:14,border:`2px solid ${C.accent}22`}}>
            <span style={{fontSize:22}}>🏢</span>
            <div style={{flex:1,textAlign:"left"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.navy}}>기업 담당자로 시작하기</div>
              <div style={{fontSize:12,color:C.g400}}>인재를 발견하고 러브콜을 보내요</div>
            </div>
            <span style={{color:C.g400,fontSize:18}}>›</span>
          </button>
        ):(
          <div style={{background:C.white,borderRadius:18,padding:"18px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:`2px solid ${C.accent}33`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <span style={{fontSize:20}}>🏢</span>
              <span style={{fontSize:15,fontWeight:700,color:C.navy}}>기업 담당자 가입</span>
            </div>
            <input placeholder="✏️ 담당자 이름  예) (주)홀트식품" value={companyFormName} onChange={e=>setCompanyFormName(e.target.value)}
              style={{width:"100%",border:`1.5px solid ${companyFormName?C.accent:C.g200}`,borderRadius:12,padding:"11px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:10,background:C.g100}}/>
            <div style={{display:"flex",gap:8}}>
              <button className="btn" onClick={()=>{
                if(!companyFormName.trim()){toast("✏️ 이름을 입력해주세요!");return;}
                const compUser={id:"co"+Date.now(),name:companyFormName.trim(),role:"company"};
                setCurrentUser(compUser); setUserType("company"); setScreen("main");
                toast(`🏢 환영해요, ${compUser.name}님!`);
              }} style={{flex:1,padding:"12px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${C.accent},#52B788)`,color:"#fff",fontSize:14,fontWeight:900}}>입장하기 →</button>
              <button className="btn" onClick={()=>{setCompanyFormVisible(false);setCompanyFormName("");}} style={{padding:"12px 14px",borderRadius:12,border:`1px solid ${C.g200}`,background:C.white,color:C.g600,fontSize:13}}>취소</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  /* ══ DETAIL ══ */
  if(detail) {
    const s=detail; const m=JOB_META[s.tag]||{color:C.primary,emoji:"✨"};
    // 이 학생의 모든 게시물
    const studentPosts = posts.filter(p=>p.userId===s.userId&&(!p.hidden||isAdmin)).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    // 전체 통계
    const totalLikes = studentPosts.reduce((sum,p)=>sum+(p.likes||0),0);
    const totalComments = studentPosts.reduce((sum,p)=>sum+(p.commentList||[]).length,0);
    // 갤러리: 모든 미디어 아이템
    const allMedia = studentPosts.flatMap(p=>(p.mediaList||[]).map((item,i)=>({item,post:p,idx:i})));
    return (
      <div className="app-shell" style={{width:"100%",background:C.surface,maxWidth:520,margin:"0 auto",overflowY:"auto",overscrollBehavior:"contain"}}>
        <Toast msg={toastMsg}/>
        {/* 헤더 */}
        <div style={{background:`linear-gradient(135deg,${m.color}22,${C.primary}0a)`,padding:"52px 16px 16px",position:"relative"}}>
          <button className="btn" onClick={closeDetail} style={{position:"absolute",top:14,left:14,background:"rgba(255,255,255,0.92)",border:"none",borderRadius:12,padding:"7px 16px",fontWeight:700,fontSize:13,color:C.navy}}>← 돌아가기</button>
          <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:14}}>
            <Av src={s.profilePic} emoji={s.avatar} size={72} radius={22} color={m.color}/>
            <div style={{flex:1}}>
              <div style={{fontSize:20,fontWeight:900,color:C.navy}}>{s.name}</div>
              <div style={{fontSize:12,color:C.g400,marginTop:2}}>{s.school}</div>
              <div style={{marginTop:8}}>
                <span style={{background:m.color,color:"#fff",borderRadius:20,padding:"4px 14px",fontSize:11,fontWeight:700}}>{m.emoji} {s.tag?.replace("#","")}</span>
              </div>
            </div>
          </div>
          {/* 통계 */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[["게시물",studentPosts.length],["총 응원",totalLikes],["총 댓글",totalComments]].map(([l,v])=>(
              <div key={l} style={{background:"rgba(255,255,255,0.85)",borderRadius:12,padding:"11px 6px",textAlign:"center",backdropFilter:"blur(8px)"}}>
                <div style={{fontSize:18,fontWeight:900,color:C.navy}}>{v}</div>
                <div style={{fontSize:10,color:C.g400,marginTop:1}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        {/* 탭 전환 */}
        <div style={{display:"flex",background:C.white,borderBottom:`1px solid ${C.g200}`,position:"sticky",top:0,zIndex:10}}>
          {[["gallery","🖼️ 갤러리"],["posts","📋 게시물"]].map(([val,lbl])=>(
            <button key={val} className="btn" onClick={()=>setDetailTab(val)} style={{flex:1,padding:"13px 4px",border:"none",background:"transparent",color:detailTab===val?C.primary:C.g400,fontWeight:detailTab===val?700:400,fontSize:13,borderBottom:detailTab===val?`2.5px solid ${C.primary}`:"2.5px solid transparent",transition:"all .18s"}}>
              {lbl}
            </button>
          ))}
        </div>

        {/* ── 갤러리 탭 ── */}
        {detailTab==="gallery"&&(
          <div style={{padding:"12px 14px 120px"}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:10}}>
              {s.name?.split(" ").slice(-1)[0]} 학생의 작업 갤러리
            </div>
            {allMedia.length===0 ? (
              <div style={{textAlign:"center",padding:"52px 0",color:C.g400}}>
                <div style={{fontSize:48,marginBottom:12,opacity:0.3}}>{m.emoji}</div>
                <div style={{fontSize:14,fontWeight:600}}>아직 업로드된 사진이 없어요</div>
                <div style={{fontSize:12,marginTop:6}}>게시물 탭에서 기록을 볼 수 있어요</div>
              </div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:3}}>
                {allMedia.map(({item,post,idx},i)=>{
                  const pm=JOB_META[post.tag]||{color:C.primary,emoji:"✨"};
                  return (
                    <div key={i} onClick={()=>{
                      if(item.type?.startsWith("video")) return;
                      setLightbox({items:post.mediaList,index:idx});
                    }} style={{aspectRatio:"1",borderRadius:10,overflow:"hidden",cursor:"pointer",position:"relative",animation:`fadeUp 0.3s ${Math.min(i,8)*0.03}s ease forwards`,opacity:0}}>
                      {item.type?.startsWith("video")
                        ?<><video src={item.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.22)"}}><span style={{fontSize:22,color:"#fff"}}>▶</span></div></>
                        :<img src={item.url} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                      }
                      {/* 태그 배지 */}
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.55))",padding:"14px 5px 5px"}}>
                        <span style={{fontSize:8,color:"#fff",fontWeight:700,background:`${pm.color}cc`,borderRadius:4,padding:"2px 5px"}}>{post.tag?.replace("#","")}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── 게시물 탭 ── */}
        {detailTab==="posts"&&(
          <div style={{padding:"12px 13px 120px"}}>
            {studentPosts.length===0 ? (
              <div style={{textAlign:"center",padding:"52px 0",color:C.g400}}>
                <div style={{fontSize:40,marginBottom:10}}>📭</div>
                <div style={{fontSize:14,fontWeight:600}}>아직 게시물이 없어요</div>
              </div>
            ) : studentPosts.map((post,i)=>(
              <div key={post.id} style={{animation:`fadeUp 0.38s ${Math.min(i,4)*0.07}s ease forwards`,opacity:0}}>
                <PostCard post={post} liked={!!liked[post.id]} loved={!!loved[post.id]}
                  onLike={handleLike} onLove={p=>setLoveModal(p)}
                  onOpen={()=>{}} // 이미 같은 학생 프로필이라 재진입 불필요
                  onComment={p=>setCommentModal(p)}
                  onManage={p=>setManageModal(p)}
                  userType={userType} currentUserId={currentUser?.id} isAdmin={isAdmin}
                  onImageClick={(post,idx)=>setLightbox({items:post.mediaList||[],index:idx})}/>
              </div>
            ))}
          </div>
        )}

        {/* 러브콜 버튼 (기업 담당자) */}
        {userType==="company"&&(
          <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 28px)",maxWidth:492}}>
            <button className="btn" onClick={()=>loved[s.id]?null:setLoveModal(s)} style={{width:"100%",padding:"16px",borderRadius:20,border:"none",background:loved[s.id]?C.g200:`linear-gradient(135deg,${C.primary},${C.gold})`,color:loved[s.id]?C.g400:"#fff",fontSize:15,fontWeight:900,boxShadow:loved[s.id]?"none":"0 8px 24px rgba(255,107,53,0.38)"}}>
              {loved[s.id]?"✅ 러브콜 발송 완료":`💌 ${s.name} 학생에게 러브콜 보내기`}
            </button>
          </div>
        )}
        {loveModal&&<LoveModal post={loveModal} onClose={()=>setLoveModal(null)} onSend={handleLoveSend}/>}
        {commentModal&&<CommentModal post={commentModal} currentUser={currentUser} onClose={()=>setCommentModal(null)} onSubmit={handleCommentSubmit} onCommentLike={handleCommentLike} commentLiked={commentLiked}/>}
        {manageModal&&<ManageModal post={manageModal} onClose={()=>setManageModal(null)} onEdit={p=>{setEditModal(p);setManageModal(null);}} onDelete={handleDelete} onHide={handleHidePost} isAdmin={isAdmin}/>}
        {editModal&&<EditModal post={editModal} onClose={()=>setEditModal(null)} onSave={handleEditSave}/>}
        {lightbox&&<Lightbox items={lightbox.items} initialIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
      </div>
    );
  }

  /* ── 러브콜 전송 공통 함수 ── */
  const handleLoveSend = (p) => {
    setLoved(v=>({...v,[p.id]:true}));
    setLoveModal(null);
    toast(`💌 ${p.name} 학생에게 러브콜을 보냈어요!`);
    const now=Date.now();
    const callData={from:currentUser?.name||"기업담당자",tag:p.tag,postId:p.id,createdAt:now,time:new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})};
    FB.set(`lovecalls/${p.userId}/lc${now}`,callData);
    if(currentUser?.id){
      const sentData={postId:p.id,studentName:p.name,studentAvatar:p.avatar||"👤",studentSchool:p.school||"",tag:p.tag,desc:p.desc||"",sentAt:now,time:new Date().toLocaleString("ko-KR",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})};
      FB.set(`companyLovecalls/${currentUser.id}/lc${now}`,sentData);
      setSentLovecalls(prev=>[sentData,...prev]);
    }
  };

  /* ══ MAIN ══ */

  // 게시물 숨김/공개 토글
  const handleHidePost = async (post) => {
    const newHidden = !post.hidden;
    setPosts(prev=>prev.map(p=>p.id===post.id?{...p,hidden:newHidden}:p));
    if(detail?.id===post.id) setDetail(d=>({...d,hidden:newHidden}));
    await FB.update(`posts/${post.id}`,{hidden:newHidden});
    toast(newHidden?"🙈 게시물을 숨겼어요":"👁️ 게시물을 다시 공개했어요");
  };

  const tabs=[{id:"feed",icon:"🏠",label:"피드"},{id:"search",icon:"🔍",label:"탐색"},{id:"upload",icon:"➕",label:"업로드"},{id:"notify",icon:"🔔",label:"알림"},{id:"profile",icon:isAdmin?"🔧":"👤",label:isAdmin?"관리":"내 정보"}];
  // 관리자는 숨겨진 게시물도 볼 수 있음 (숨김 배지 표시)
  const filtered=(filterTag==="전체"?posts:posts.filter(p=>p.tag===filterTag)).filter(p=>isAdmin||!p.hidden);
  const tagColor=JOB_META[tag]?.color||C.primary;

  // ✅ FIX 4: 알림 탭에서 쓸 통합 알림 목록
  const allNotifications = [
    ...lovecalls.map(n=>({...n, _type:'lovecall', _createdAt: n.createdAt||0})),
    ...notifications.map(n=>({...n, _type: n.type, _createdAt: n.createdAt||0})),
  ].sort((a,b)=>b._createdAt - a._createdAt);

  return (
    <div className="app-shell" style={{width:"100%",background:C.surface,maxWidth:520,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <Toast msg={toastMsg}/>
      <div style={{flexShrink:0,background:"rgba(250,250,248,0.95)",backdropFilter:"blur(12px)",padding:"13px 16px 9px",borderBottom:`1px solid ${C.g200}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer"}} onClick={()=>setActiveTab("feed")}>
          <span style={{fontSize:18}}>✨</span>
          <span style={{fontSize:19,fontWeight:900,color:C.primary,letterSpacing:-0.5}}>드림 커리어</span>
          {syncStatus==="saving"&&<span style={{fontSize:10,color:C.g400}}>저장 중...</span>}
          {syncStatus==="saved"&&<span style={{fontSize:10,color:"#2D6A4F"}}>✓ 저장됨</span>}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{background:userType==="company"?C.accent:C.primary,color:"#fff",borderRadius:10,padding:"4px 11px",fontSize:11,fontWeight:700}}>
            {userType==="company"?`🏢 ${currentUser?.name||"기업"}`:("🎓 "+(currentUser?.name||"학생"))}
          </span>
          <span style={{fontSize:20,cursor:"pointer"}} onClick={()=>setActiveTab("notify")}>🔔</span>
        </div>
      </div>

      {/* 스크롤 컨텐츠 영역 */}
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden",overscrollBehavior:"contain"}}
        ref={feedRef}
        onTouchStart={e=>{
          if (activeTab !== "feed") return;
          if (e.currentTarget.scrollTop === 0) {
            pullStartY.current = e.touches[0].clientY;
            isPulling.current = true;
          }
        }}
        onTouchMove={e=>{
          if (!isPulling.current || activeTab !== "feed") return;
          const dy = e.touches[0].clientY - pullStartY.current;
          if (dy > 0 && dy < 80) setPullY(dy);
        }}
        onTouchEnd={()=>{
          if (!isPulling.current) return;
          if (activeTab === "feed" && pullY > 52) loadFromFirebase(true);
          setPullY(0);
          isPulling.current = false;
        }}
      >

      {/* 피드 */}
      {activeTab==="feed"&&(
        <div style={{padding:"12px 13px 100px"}}>
          {/* 당김 새로고침 인디케이터 */}
          <div style={{height:pullY>0?pullY:isRefreshing?52:0,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",transition:pullY>0?"none":"height 0.3s ease"}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:24,height:24,border:`3px solid ${C.g200}`,borderTopColor:C.primary,borderRadius:"50%",animation:(isRefreshing||pullY>52)?"spin 0.8s linear infinite":"none",transform:pullY>0&&!isRefreshing?`rotate(${pullY*3}deg)`:"none"}}/>
              <span style={{fontSize:11,color:C.g400,fontWeight:600}}>{isRefreshing?"새 게시물 확인 중...":pullY>52?"놓으면 새로고침":"당겨서 새로고침"}</span>
            </div>
          </div>
          <div style={{borderRadius:22,background:`linear-gradient(135deg,${C.navy},${C.navyMid})`,padding:"18px 18px",color:"#fff",marginBottom:13,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",right:-16,top:-16,fontSize:90,opacity:0.06}}>⭐</div>
            <div style={{fontSize:11,fontWeight:700,color:C.gold,marginBottom:4,letterSpacing:1}}>🌐 실시간 피드</div>
            <div style={{fontSize:18,fontWeight:900,lineHeight:1.4}}>모아 보는 포트폴리오</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.65)",marginTop:6,display:"flex",alignItems:"center",gap:8}}>
              <span>당겨서 새 게시물 확인하기</span>
              <button className="btn" onClick={()=>loadFromFirebase(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"3px 9px",fontSize:11,color:"#fff",fontWeight:700}}>↻ 새로고침</button>
            </div>
          </div>
          <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:13,paddingBottom:2}}>
            {["전체",...JOB_TAGS].map(f=>(
              <button key={f} className="btn" onClick={()=>setFilterTag(f)} style={{whiteSpace:"nowrap",padding:"7px 13px",borderRadius:20,border:"none",background:filterTag===f?C.primary:C.white,color:filterTag===f?"#fff":C.g600,fontWeight:filterTag===f?700:400,fontSize:12,boxShadow:filterTag===f?"0 3px 10px rgba(255,107,53,0.3)":"0 2px 6px rgba(0,0,0,0.05)"}}>
                {f==="전체"?f:(JOB_META[f]?.emoji+" "+f)}
              </button>
            ))}
          </div>
          {!postsReady&&<div style={{textAlign:"center",padding:"48px 20px",color:C.g400}}><div style={{display:"inline-block",width:28,height:28,border:`3px solid ${C.g200}`,borderTopColor:C.primary,borderRadius:"50%",animation:"spin 0.8s linear infinite",marginBottom:12}}/><div style={{fontSize:13}}>서버에서 불러오는 중...</div></div>}

            <div key={post.id} style={{animation:`fadeUp 0.42s ${Math.min(i,4)*0.07}s ease forwards`,opacity:0,position:"relative"}}>

                                    </div>
                                  )}
                                  {/* 하단 태그 + 응원 수 */}
                                  <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.62))",padding:"14px 5px 5px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                                    <span style={{fontSize:9,color:"#fff",fontWeight:700,background:`${m.color}cc`,borderRadius:5,padding:"2px 5px"}}>{post.tag?.replace("#","")}</span>
                                    {(post.likes||0)>0&&<span style={{fontSize:9,color:"#fff"}}>💛 {post.likes}</span>}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            )}
            <div>
              <div className="card" onClick={()=>{ if(!showSettings&&currentUser){setStName(currentUser.name||"");setStSchool(currentUser.school||"");setStAvatar(currentUser.avatar||"👩");setStPic(currentUser.pic||null);} setShowSettings(p=>!p); }}
                style={{background:C.white,borderRadius:14,padding:"14px",marginBottom:showSettings?0:9,boxShadow:"0 2px 6px rgba(0,0,0,0.04)",display:"flex",alignItems:"center",gap:12,cursor:"pointer",borderBottomLeftRadius:showSettings?0:14,borderBottomRightRadius:showSettings?0:14}}>
                <span style={{fontSize:20}}>⚙️</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.navy}}>개인정보 설정</div>
                  <div style={{fontSize:12,color:C.g400}}>이름, 학교, 사진 수정</div>
                </div>
                <span style={{color:C.g400,fontSize:16,transition:"transform .2s",transform:showSettings?"rotate(90deg)":"none"}}>›</span>
              </div>
              {showSettings&&userType==="student"&&(
                <div style={{background:C.g100,borderRadius:"0 0 16px 16px",padding:"16px 14px 18px",marginBottom:9}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                    <div style={{position:"relative",flexShrink:0}}>
                      <div style={{width:60,height:60,borderRadius:18,background:`${C.primary}22`,border:`2px solid ${C.primary}44`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>
                        {stPic?<img src={stPic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:stAvatar}
                      </div>
                      <input ref={settingsPicRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>pickSingleFile(e,url=>setStPic(url))}/>
                      <button className="btn" onClick={()=>settingsPicRef.current.click()} style={{position:"absolute",bottom:-4,right:-4,width:22,height:22,borderRadius:7,background:C.primary,border:"2.5px solid white",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>📷</button>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:C.g400,marginBottom:6}}>아이콘 선택</div>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                        {AVATARS.map(a=>(<button key={a} className="btn" onClick={()=>{setStAvatar(a);setStPic(null);}} style={{width:30,height:30,borderRadius:9,border:`2px solid ${stAvatar===a&&!stPic?C.primary:C.g200}`,background:stAvatar===a&&!stPic?C.soft:C.white,fontSize:16}}>{a}</button>))}
                      </div>
                    </div>
                  </div>
                  <input value={stName} onChange={e=>setStName(e.target.value)} placeholder="이름" style={{width:"100%",border:`1.5px solid ${stName?C.primary:C.g200}`,borderRadius:12,padding:"10px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:8,background:C.white}}/>
                  <input value={stSchool} onChange={e=>setStSchool(e.target.value)} placeholder="학교 및 학년" style={{width:"100%",border:`1.5px solid ${C.g200}`,borderRadius:12,padding:"10px 13px",fontSize:14,color:C.navy,outline:"none",marginBottom:14,background:C.white}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button className="btn" onClick={saveSettings} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:C.primary,color:"#fff",fontWeight:700,fontSize:14}}>저장하기</button>
                    <button className="btn" onClick={()=>setShowSettings(false)} style={{flex:1,padding:"11px",borderRadius:12,border:`1px solid ${C.g200}`,background:C.white,color:C.g600,fontWeight:700,fontSize:14}}>취소</button>
                  </div>
                </div>
              )}
            </div>
            <button className="btn" onClick={()=>{setCurrentUser(null);LS.set("dc_current_user",null);setScreen("login");setLoginTab("new");setFormName("");setFormSchool("");setFormPic(null);}} style={{width:"100%",padding:"13px",borderRadius:14,border:`1px solid ${C.g200}`,background:C.white,color:C.g600,fontSize:14,fontWeight:600,marginTop:4}}>로그아웃</button>
          </div>
          )}{/* end !isAdmin */}
        </div>
      )}

      </div>{/* end scroll area */}

      {/* 하단 탭바 */}
      <div className="tab-bar" style={{flexShrink:0,background:"rgba(250,250,248,0.96)",backdropFilter:"blur(14px)",borderTop:`1px solid ${C.g200}`,display:"flex",paddingTop:7}}>
        {tabs.map(tab=>(
          <button key={tab.id} className="btn" onClick={()=>setActiveTab(tab.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",padding:"5px 0",position:"relative"}}>
            <span style={{fontSize:tab.id==="upload"?24:20,filter:activeTab===tab.id?"none":"grayscale(1) opacity(0.42)",transition:"all .18s"}}>{tab.icon}</span>
            <span style={{fontSize:10,fontWeight:activeTab===tab.id?700:400,color:activeTab===tab.id?C.primary:C.g400}}>{tab.label}</span>
            {/* ✅ FIX 4: 알림 뱃지 */}
            {tab.id==="notify"&&userType==="student"&&allNotifications.length>0&&(
              <span style={{position:"absolute",top:2,right:"18%",width:8,height:8,borderRadius:"50%",background:C.primary,border:"1.5px solid white"}}/>
            )}
          </button>
        ))}
      </div>

      {loveModal&&<LoveModal post={loveModal} onClose={()=>setLoveModal(null)} onSend={handleLoveSend}/>}
      {commentModal&&<CommentModal post={commentModal} currentUser={currentUser} onClose={()=>setCommentModal(null)} onSubmit={handleCommentSubmit} onCommentLike={handleCommentLike} commentLiked={commentLiked}/>}
      {manageModal&&<ManageModal post={manageModal} onClose={()=>setManageModal(null)} onEdit={p=>{setEditModal(p);setManageModal(null);}} onDelete={handleDelete} onHide={handleHidePost} isAdmin={isAdmin}/>}
      {editModal&&<EditModal post={editModal} onClose={()=>setEditModal(null)} onSave={handleEditSave}/>}
      {/* ✅ FIX 3: 전역 라이트박스 */}
      {lightbox&&<Lightbox items={lightbox.items} initialIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
    </div>
  );
}

/* ── 관리 모달 ── */
function ManageModal({post, onClose, onEdit, onDelete, onHide, isAdmin}) {
  const [confirm,setConfirm] = useState(false);
  const m=JOB_META[post.tag]||{color:C.primary,emoji:"✨"};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:C.white,borderRadius:"24px 24px 0 0",padding:"24px 18px 36px",width:"100%",maxWidth:480,animation:"slideUp 0.28s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,padding:"12px",background:C.g100,borderRadius:14}}>
          <div style={{width:40,height:40,borderRadius:12,background:`${m.color}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{m.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:700,color:C.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{post.desc||"내용 없음"}</div>
            <div style={{fontSize:11,color:C.g400,marginTop:2}}>{post.tag} · {post.time}</div>
          </div>
        </div>
        {!confirm?(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button className="btn" onClick={()=>onEdit(post)} style={{padding:"15px",borderRadius:16,border:`1.5px solid ${C.primary}`,background:C.soft,color:C.primary,fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>✏️ 게시물 수정하기</button>
            {isAdmin&&onHide&&(
              <button className="btn" onClick={()=>{onHide(post);onClose();}} style={{padding:"15px",borderRadius:16,border:`1.5px solid ${post.hidden?"#4CAF50":"#FF9800"}`,background:post.hidden?"#F1F8E9":"#FFF8E1",color:post.hidden?"#2E7D32":"#E65100",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {post.hidden?"👁️ 게시물 공개하기":"🙈 게시물 숨기기"}
              </button>
            )}
            <button className="btn" onClick={()=>setConfirm(true)} style={{padding:"15px",borderRadius:16,border:"1.5px solid #FFCDD2",background:"#FFF5F5",color:"#E53935",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🗑️ 게시물 삭제하기</button>
          </div>
        ):(
          <div>
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
              <div style={{fontSize:16,fontWeight:700,color:C.navy}}>정말 삭제할까요?</div>
              <div style={{fontSize:13,color:C.g400,marginTop:4}}>삭제하면 복구할 수 없어요</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn" onClick={onClose} style={{flex:1,padding:"14px",borderRadius:14,border:`1px solid ${C.g200}`,background:C.white,color:C.g600,fontSize:14,fontWeight:700}}>취소</button>
              <button className="btn" onClick={()=>onDelete(post)} style={{flex:1,padding:"14px",borderRadius:14,border:"none",background:"#E53935",color:"#fff",fontSize:14,fontWeight:900}}>삭제</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── 수정 모달 ── */
function EditModal({post,onClose,onSave}) {
  const [editDesc,setEditDesc] = useState(post.desc||"");
  const [editTag,setEditTag]   = useState(post.tag||"#바리스타");
  const [editScore,setEditScore] = useState(post.progress||50);
  const tagColor=JOB_META[editTag]?.color||C.primary;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,overflowY:"auto",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:20}}>
      <div style={{background:C.white,borderRadius:24,padding:"22px 18px 32px",width:"calc(100% - 28px)",maxWidth:480,animation:"fadeUp 0.28s ease",marginBottom:20}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
          <div style={{fontSize:17,fontWeight:900,color:C.navy}}>✏️ 게시물 수정</div>
          <button className="btn" onClick={onClose} style={{background:C.g100,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,color:C.g600,fontWeight:700}}>닫기</button>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.g600,marginBottom:7}}>📝 내용</div>
          <textarea value={editDesc} onChange={e=>setEditDesc(e.target.value)} rows={5} style={{width:"100%",border:"none",outline:"none",fontSize:14,color:C.navy,resize:"none",background:"transparent",lineHeight:1.7}}/>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:C.g600,marginBottom:9}}>🏷️ 직무 태그</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {JOB_TAGS.map(t=>(
              <button key={t} className="btn" onClick={()=>setEditTag(t)} style={{padding:"6px 12px",borderRadius:11,border:"none",background:editTag===t?C.primary:C.white,color:editTag===t?"#fff":C.g600,fontWeight:editTag===t?700:400,fontSize:12}}>{JOB_META[t]?.emoji} {t}</button>
            ))}
          </div>
        </div>
        <div style={{background:C.g100,borderRadius:16,padding:"13px 14px",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:700,color:C.g600}}>📊 직무 숙련도</div>
            <span style={{fontSize:13,fontWeight:900,color:tagColor}}>{editScore}점</span>
          </div>
          <input type="range" min="0" max="100" step="5" value={editScore} onChange={e=>setEditScore(Number(e.target.value))} style={{width:"100%",accentColor:tagColor,cursor:"pointer"}}/>
        </div>
        <button className="btn" onClick={()=>onSave(post.id,editDesc,editTag,editScore)} style={{width:"100%",padding:"16px",borderRadius:18,border:"none",background:`linear-gradient(135deg,${C.primary},${C.gold})`,color:"#fff",fontSize:15,fontWeight:900,boxShadow:"0 6px 18px rgba(255,107,53,0.35)"}}>✅ 수정 완료</button>
      </div>
    </div>
  );
}

/* ── 러브콜 모달 ── */
function LoveModal({post,onClose,onSend}) {
  const m=JOB_META[post.tag]||{color:C.primary};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.48)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:C.white,borderRadius:"26px 26px 0 0",padding:"28px 20px 44px",width:"100%",maxWidth:520,animation:"slideUp 0.3s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:44,marginBottom:9}}>💌</div>
          <div style={{fontSize:19,fontWeight:900,color:C.navy}}>{post.name} 학생에게<br/>러브콜 보내기</div>
        </div>
        <div style={{background:C.soft,borderRadius:14,padding:"13px 15px",marginBottom:16,fontSize:13,color:C.g600,lineHeight:1.65}}>
          📋 귀하의 <strong style={{color:m.color}}>{post.tag?.replace("#","")}</strong> 역량에 관심을 가지고 있습니다.
        </div>
        <button className="btn" onClick={()=>onSend(post)} style={{width:"100%",padding:"16px",borderRadius:18,border:"none",background:`linear-gradient(135deg,${C.primary},${C.gold})`,color:"#fff",fontSize:15,fontWeight:900,boxShadow:"0 8px 22px rgba(255,107,53,0.38)"}}>
          💌 러브콜 발송하기
        </button>
      </div>
    </div>
  );
}

/* ── 댓글 모달 ── */
function CommentModal({post, currentUser, onClose, onSubmit, onCommentLike, commentLiked}) {
  const [text,setText] = useState("");
  const m=JOB_META[post.tag]||{color:"#FF6B35"};
  const comments=post.commentList||[];
  const handleSend = () => {
    if(!text.trim()) return;
    onSubmit(post.id,{author:currentUser?.name||"익명",avatar:currentUser?.avatar||"👤",pic:currentUser?.pic||null,userId:currentUser?.id||null,text:text.trim(),time:"방금 전",createdAt:Date.now()});
    setText("");
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
      <div style={{background:"#fff",borderRadius:"24px 24px 0 0",maxHeight:"80vh",display:"flex",flexDirection:"column",animation:"slideUp 0.3s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"16px 18px 12px",borderBottom:`1px solid ${C.g200}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:C.navy}}>💬 댓글</div>
            <div style={{fontSize:11,color:C.g400,marginTop:2}}>{post.name}님의 게시물 · {comments.length}개</div>
          </div>
          <button className="btn" onClick={onClose} style={{background:C.g100,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,color:C.g600,fontWeight:700}}>닫기</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"14px 18px",display:"flex",flexDirection:"column",gap:12}}>
          {comments.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:C.g400}}><div style={{fontSize:32,marginBottom:8}}>💬</div><div style={{fontSize:13,fontWeight:600}}>첫 번째 댓글을 남겨보세요!</div></div>}
          {comments.map((c,i)=>{
            const likeKey = `${post.id}_${i}`;
            const isLiked = !!(commentLiked&&commentLiked[likeKey]);
            const likeCount = c.likes||0;
            return (
              <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",animation:`fadeUp 0.3s ${i*0.04}s ease forwards`,opacity:0}}>
                <div style={{width:34,height:34,borderRadius:11,background:`${m.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,flexShrink:0,overflow:"hidden"}}>
                  {c.pic?<img src={c.pic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:c.avatar||"👤"}
                </div>
                <div style={{flex:1,background:C.g100,borderRadius:"4px 14px 14px 14px",padding:"9px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:700,color:C.navy}}>{c.author}</span>
                    <span style={{fontSize:10,color:C.g400}}>{c.createdAt?timeAgo(c.createdAt):c.time}</span>
                  </div>
                  <div style={{fontSize:13,color:C.g600,lineHeight:1.55}}>{c.text}</div>
                  {/* 댓글 하트 */}
                  <div style={{display:"flex",justifyContent:"flex-end",marginTop:7}}>
                    <button className="btn" onClick={()=>onCommentLike&&onCommentLike(post,i)}
                      style={{display:"flex",alignItems:"center",gap:4,background:isLiked?"#FFF0F0":C.white,border:`1.5px solid ${isLiked?"#FF6B6B":C.g200}`,borderRadius:20,padding:"3px 10px",fontSize:12,color:isLiked?"#E53935":C.g400,fontWeight:isLiked?700:400,transition:"all .18s",cursor:"pointer"}}>
                      <span style={{fontSize:13}}>{isLiked?"❤️":"🤍"}</span>
                      {likeCount>0&&<span style={{fontSize:11}}>{likeCount}</span>}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{padding:"12px 14px 28px",borderTop:`1px solid ${C.g200}`,display:"flex",gap:9,alignItems:"flex-end",flexShrink:0,background:"#fff"}}>
          <div style={{width:36,height:36,borderRadius:11,background:`${C.primary}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,overflow:"hidden"}}>
            {currentUser?.pic?<img src={currentUser.pic} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:currentUser?.avatar||"👤"}
          </div>
          <div style={{flex:1,background:C.g100,borderRadius:16,padding:"10px 14px",display:"flex",alignItems:"flex-end",gap:8}}>
            <textarea value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend();}}} placeholder="응원 댓글을 남겨보세요 😊" rows={1}
              style={{flex:1,border:"none",outline:"none",fontSize:14,color:C.navy,resize:"none",background:"transparent",lineHeight:1.5,maxHeight:80,overflowY:"auto"}}/>
            <button className="btn" onClick={handleSend} disabled={!text.trim()} style={{width:34,height:34,borderRadius:10,border:"none",background:text.trim()?C.primary:C.g200,color:text.trim()?"#fff":C.g400,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>➤</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
