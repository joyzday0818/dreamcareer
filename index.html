async function uploadToCloudinary(file) {
  // 이미지는 압축 후 업로드, 영상은 직접 업로드
  let blob, mimeType;
  if (file.type && file.type.startsWith("video")) {
    blob = file;
    mimeType = file.type;
  } else {
    const compressed = await compressFile(file);
    blob = await fetch(compressed.url).then(r => r.blob());
    mimeType = compressed.type;
  }
  const fd = new FormData();
  fd.append("file", blob);
  fd.append("upload_preset", CLOUDINARY_PRESET);
  const resourceType = mimeType.startsWith("video") ? "video" : "image";
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/${resourceType}/upload`, {
    method: "POST", body: fd
  });
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || "업로드 실패");
  return { url: data.secure_url, type: mimeType };
}
const CLOUD_NAME = "dhahimnof";
const CLOUD_PRESET = "dreamcareer";

// Cloudinary 업로드 (이미지/영상을 CDN에 올리고 URL 반환)
async function uploadToCloudinary(file) {
  const isVideo = file.type.startsWith("video/");
  const resourceType = isVideo ? "video" : "image";

  // 이미지면 먼저 압축 후 업로드
  let uploadFile = file;
  if (!isVideo) {
    uploadFile = await new Promise(res => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => res(blob), "image/jpeg", 0.82);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  const formData = new FormData();
  formData.append("file", uploadFile);
  formData.append("upload_preset", CLOUD_PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`,
    { method: "POST", body: formData }
  );
  const data = await res.json();
  if (!data.secure_url) throw new Error(data.error?.message || "업로드 실패");
  return { url: data.secure_url, type: file.type, public_id: data.public_id };
}

function calcPersonaLine(posts) {
  if (!posts.length) return null;

function pickHighlightComments(posts, max) {
  max = max || 2;
  const POSITIVE_WORDS = ["잘","최고","멋","대단","훌륭","좋","감동","뿌듯","응원","화이팅","최선","완벽","성장","발전"];
  const all = [];
  posts.forEach(p => {
    (p.commentList||[]).forEach(c => {
      if (!c.text) return;
      const score = POSITIVE_WORDS.reduce((s,w)=>s+(c.text.includes(w)?1:0),0) + Math.min(c.text.length/20,2);
      all.push({text:c.text, from:c.name||c.from||"익명", score});
    });
  });
  all.sort((a,b)=>b.score-a.score);
  return all.slice(0,max);
}

function compressFile(file) {

      if (file.type.startsWith("video/")) {

          type: file.type
        });
        return;
      }
      const img = new Image();
      img.onload = () => {
        // 동시 업로드 시 Firebase 부하 감소: 최대 720px, 품질 0.65
        const MAX = 720;
        let w = img.width,
          h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) {
            h = Math.round(h * MAX / w);
            w = MAX;
          } else {
            w = Math.round(w * MAX / h);
            h = MAX;
          }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        res({
          url: canvas.toDataURL("image/jpeg", 0.65),
          type: "image/jpeg"
        });
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  });
}
